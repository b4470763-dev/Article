<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Geometry Portal</title>
    <style>

        :root {
            --page: #eef3f6;
            --text: #203040;
            --button: #ffffff;
            --button-border: #cfdbe6;
            --active: #17324d;
            --active-text: #ffffff;
            --shadow: 0 14px 32px rgba(27, 42, 58, 0.08);
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Tahoma, Arial, sans-serif;
            color: var(--text);
            background: var(--page);
            overflow: hidden;
        }
        .lang-switch {
            position: fixed;
            top: 18px;
            left: 22px;
            z-index: 20;
        }
        .lang-switch button,
        .side-button,
        .tab-button,
        .mobile-menu-button,
        .mobile-close,
        .mobile-nav-item {
            font: inherit;
            border: 1px solid var(--button-border);
            background: var(--button);
            color: var(--text);
            cursor: pointer;
        }
        .lang-switch button {
            min-width: 92px;
            padding: 10px 16px;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .app {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 260px;
            grid-template-areas: "main side";
            gap: 22px;
            height: 100vh;
            height: 100dvh;
            padding: 72px 24px 24px;
            direction: ltr;
        }
        .content {
            grid-area: main;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            min-height: 44px;
        }
        .tab-button {
            min-height: 40px;
            padding: 9px 14px;
            border-radius: 8px;
            max-width: 360px;
            line-height: 1.35;
            transition: background .18s ease, color .18s ease, border-color .18s ease, transform .18s ease;
        }
        .tab-button[aria-selected="true"],
        .side-button[aria-pressed="true"] {
            background: var(--active);
            color: var(--active-text);
            border-color: var(--active);
        }
        .frame-host {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            background: transparent;
        }
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            background: transparent;
        }
        .sidebar {
            grid-area: side;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }
        .side-button {
            width: 100%;
            min-height: 58px;
            padding: 14px 16px;
            border-radius: 8px;
            line-height: 1.35;
            text-align: start;
            box-shadow: 0 8px 18px rgba(27, 42, 58, 0.06);
            transition: background .18s ease, color .18s ease, border-color .18s ease, transform .18s ease;
        }
        button:hover { transform: translateY(-1px); }
        button:focus-visible {
            outline: 3px solid rgba(45, 125, 123, 0.35);
            outline-offset: 2px;
        }
        html[dir="rtl"] .side-button,
        html[dir="rtl"] .tab-button { text-align: right; }
        html[dir="rtl"] .tabs,
        html[dir="rtl"] .sidebar { direction: rtl; }
        .mobile-menu-button,
        .mobile-scrim,
        .mobile-drawer {
            display: none;
        }

        @media (max-width: 820px) {
            html, body {
                height: 100%;
                overflow: hidden;
                background: var(--page);
            }
            .lang-switch {
                top: max(8px, env(safe-area-inset-top));
                left: 8px;
                z-index: 50;
            }
            .lang-switch button {
                min-width: 76px;
                min-height: 38px;
                padding: 8px 12px;
                border-radius: 999px;
                box-shadow: 0 8px 18px rgba(27, 42, 58, 0.12);
            }
            .mobile-menu-button {
                position: fixed;
                top: max(8px, env(safe-area-inset-top));
                right: 8px;
                z-index: 55;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 44px;
                height: 40px;
                border-radius: 999px;
                box-shadow: 0 8px 18px rgba(27, 42, 58, 0.12);
                gap: 4px;
                flex-direction: column;
            }
            .mobile-menu-button span {
                width: 18px;
                height: 2px;
                border-radius: 999px;
                background: currentColor;
                display: block;
            }
            .mobile-scrim {
                position: fixed;
                inset: 0;
                z-index: 60;
                display: block;
                opacity: 0;
                pointer-events: none;
                background: rgba(15, 23, 42, 0.36);
                transition: opacity .2s ease;
            }
            .mobile-drawer {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                z-index: 70;
                display: flex;
                flex-direction: column;
                width: min(82vw, 340px);
                padding: calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom));
                background: #f8fbfc;
                box-shadow: -18px 0 36px rgba(15, 23, 42, 0.22);
                transform: translateX(105%);
                transition: transform .24s ease;
                direction: rtl;
            }
            body.mobile-menu-open .mobile-scrim {
                opacity: 1;
                pointer-events: auto;
            }
            body.mobile-menu-open .mobile-drawer {
                transform: translateX(0);
            }
            .mobile-drawer-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                padding-bottom: 12px;
                border-bottom: 1px solid rgba(32, 48, 64, 0.12);
            }
            .mobile-menu-title {
                font-size: 1rem;
                font-weight: 700;
            }
            .mobile-close {
                width: 38px;
                height: 38px;
                border-radius: 999px;
                font-size: 1.2rem;
                line-height: 1;
            }
            .mobile-menu-list {
                flex: 1;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding: 12px 0 4px;
            }
            .mobile-nav-heading {
                margin: 14px 4px 8px;
                font-size: 0.82rem;
                color: #64748b;
                font-weight: 700;
            }
            .mobile-nav-item {
                width: 100%;
                min-height: 46px;
                margin-bottom: 8px;
                padding: 10px 12px;
                border-radius: 12px;
                text-align: start;
                line-height: 1.35;
                box-shadow: none;
            }
            .mobile-nav-item.is-active {
                background: var(--active);
                color: var(--active-text);
                border-color: var(--active);
            }
            .app {
                display: flex;
                flex-direction: column;
                height: 100vh;
                height: 100dvh;
                min-height: 0;
                gap: 0;
                padding: calc(50px + env(safe-area-inset-top)) 0 0;
                overflow: hidden;
            }
            .sidebar,
            .tabs {
                display: none !important;
            }
            .content {
                flex: 1;
                min-height: 0;
                gap: 0;
            }
            .frame-host {
                flex: 1;
                min-height: 0;
                overflow: hidden;
                border-top: 1px solid rgba(32, 48, 64, 0.1);
            }
            iframe {
                height: 100%;
                min-height: 0;
            }
        }
    

    /* mobile-edge-safe-v13 */
    @media (max-width: 820px) {
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      .app,
      .app-shell,
      .workspace,
      .main,
      .main-panel,
      .content,
      .content-area,
      .viewer,
      .frame-wrap,
      .frame-shell,
      .stage,
      iframe {
        max-width: 100% !important;
        min-width: 0 !important;
      }
      iframe,
      .content-frame {
        width: 100% !important;
        display: block;
      }
    }

</style>

        </aside>

p: 15px;\n            font-size: 0.9rem;\n        }\n        .legend div { display: flex; align-items: center; gap: 8px; }\n        .color-box { width: 15px; height: 15px; border-radius: 3px; }\n        .math-box {\n            text-align: center;\n            margin: 25px 0;\n            font-family: \"Times New Roman\", Times, serif;\n            direction: ltr;\n            font-size: 1.25rem;\n            overflow-x: auto;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            gap: 10px;\n            flex-wrap: wrap;\n        }\n        .math-inline {\n            font-family: \"Times New Roman\", Times, serif;\n            direction: ltr;\n            display: inline-block;\n            font-style: italic;\n        }\n        .frac {\n            display: inline-block;\n            vertical-align: middle;\n            text-align: center;\n            margin: 0 5px;\n            user-select: none;\n        }\n        .frac span { display: block; padding: 0 5px; }\n        .frac .top { border-bottom: 1px solid #000; }\n        .matrix {\n            display: inline-table;\n            vertical-align: middle;\n            border-left: 2px solid #000;\n            border-right: 2px solid #000;\n            border-radius: 6px;\n            margin: 0 5px;\n            border-collapse: collapse;\n            user-select: none;\n        }\n        .matrix td { padding: 4px 12px; text-align: center; }\n        @media (max-width: 760px) {\n            body { padding: 18px 18px 56px; }\n            h1 { font-size: 1.55rem; }\n            .math-box { font-size: 1.05rem; }\n        }\n\n        .references {\n            margin-top: 12px;\n            padding-left: 28px;\n            font-size: 0.98rem;\n            line-height: 1.65;\n        }\n        .references li {\n            margin-bottom: 8px;\n            text-align: left;\n        }\n    \n        .author-credit {\n            margin-top: 22px;\n            font-size: 1rem;\n            font-weight: 500;\n        }\n    \n        /* mobile-layout-fix-article */\n        svg { max-width: 100%; height: auto; }\n        @media (max-width: 560px) {\n            body {\n                padding: 14px 12px 48px !important;\n                line-height: 1.7;\n                overflow-x: hidden;\n            }\n            .container { max-width: 100%; }\n            h1 {\n                font-size: 1.34rem !important;\n                line-height: 1.35;\n            }\n            h2 {\n                font-size: 1.08rem;\n                margin-top: 28px;\n            }\n            h3 { font-size: 1rem; }\n            p, ul, ol { font-size: 0.98rem !important; }\n            .abstract,\n            .svg-container { padding: 14px !important; }\n            .math-box {\n                font-size: 0.98rem !important;\n                justify-content: flex-start;\n            }\n        }\n\n        /* mobile-native-v3-article */\n        @media (max-width: 640px) {\n            body {\n                padding: 16px 14px 56px !important;\n                line-height: 1.75;\n                overflow-x: hidden;\n                background: transparent;\n            }\n            .container {\n                width: 100%;\n                max-width: 100%;\n                margin: 0;\n            }\n            h1 {\n                font-size: 1.36rem !important;\n                line-height: 1.35;\n                margin-bottom: 10px;\n            }\n            h2 {\n                font-size: 1.08rem;\n                line-height: 1.45;\n                margin-top: 30px;\n                padding-bottom: 7px;\n            }\n            h3 {\n                font-size: 0.98rem;\n                line-height: 1.45;\n            }\n            p, ul, ol {\n                font-size: 0.98rem !important;\n            }\n            p {\n                text-align: start;\n            }\n            .abstract,\n            .svg-container {\n                padding: 14px !important;\n                border-radius: 8px !important;\n            }\n            .legend {\n                justify-content: flex-start !important;\n                gap: 10px !important;\n            }\n            .math-box {\n                font-size: 0.98rem !important;\n                justify-content: flex-start !important;\n                overflow-x: auto;\n                flex-wrap: nowrap;\n                padding-bottom: 4px;\n            }\n            svg {\n                max-width: 100%;\n                height: auto;\n            }\n            .references {\n                padding-inline-start: 22px !important;\n                overflow-wrap: anywhere;\n            }\n        }\n\n\n        /* mobile-doc-edge-safe-v13 */\n        @media (max-width: 820px) {\n            html,\n            body {\n                width: 100%;\n                max-width: 100%;\n                overflow-x: hidden !important;\n            }\n            *,\n            *::before,\n            *::after {\n                box-sizing: border-box;\n            }\n        }\n\n</style>\n</head>\n<body>\n<div class=\"container\">\n    <h1>Escape from the Euclidean Prison of the Mind</h1>\n    <h3>Historical Inversion of Algebra and Geometry in Understanding Non-Euclidean Spaces</h3>\n    <p><em>A draft on structuralist epistemology and the philosophy of mathematics</em></p>\n\n    <div class=\"abstract\">\n        <strong>Abstract:</strong><br>\n        This article examines the deep interaction between abstract algebraic structures and intuitive geometric understanding. Focusing on the cognitive limits of human beings, rooted in biological evolution and in an a priori Euclidean grasp of space, as Immanuel Kant argued, it shows how modern mathematics has been able to break this prior pressure through algebraic tools, especially group theory and complex numbers. The article begins with a precise study of a non-abelian group on the set <span class=\"math-inline\">Z × Z</span>, then turns to the Poincare disk model of hyperbolic geometry, and finally proves the equivalence between the composition of Mobius functions and matrix multiplication. In this way it shows how a non-abelian structure can describe the curvature of space.\n    </div>\n\n    <h2>1. Introduction: Intuition and Abstraction</h2>\n    <p>In the <em>Critique of Pure Reason</em>, Immanuel Kant argued that space and time are not empirical concepts, but a priori forms of the mind. From Kant's point of view, the human mind has a cognitive filter that processes the world absolutely according to Euclidean geometry. Biologically and evolutionarily, we have lived in local and relatively flat environments, and for this reason spatial imagination beyond three-dimensional Euclidean space feels almost impossible to us.</p>\n    <p>Yet the progress of mathematics showed that although our intuition is trapped in a Euclidean cage, logic and algebra provide a route of escape. By creating abstract structures that do not require mental visualization, mathematics became an exoskeleton for human reason. To understand this mechanism, we must first turn to the most fundamental language of abstraction in mathematics: group theory.</p>\n\n    <h2>2. Foundations of Structuralism: Group Theory and Parallel Realities</h2>\n    <p>To understand how the laws of a space can be changed, we must first define a group. A group <span class=\"math-inline\">(G, ∘)</span> consists of a set such as <span class=\"math-inline\">G</span> and a binary operation such as <span class=\"math-inline\">∘</span> satisfying four conditions: closure, associativity, the existence of an identity element <span class=\"math-inline\">(e)</span>, and the existence of inverses <span class=\"math-inline\">(a<sup>-1</sup>)</span>. If commutativity, <span class=\"math-inline\">(a ∘ b = b ∘ a)</span>, also holds, the group is called <strong>abelian</strong>.</p>\n    <h3>Example: Two Different Worlds on One Set</h3>\n    <p>Suppose our set is the ordered pairs of integers: <span class=\"math-inline\">S = Z × Z</span>.</p>\n    <p><strong>The first world, an abelian group:</strong> If the operation <span class=\"math-inline\">+</span> is defined as ordinary vector addition,</p>\n    <div class=\"math-box\">(a, b) + (c, d) = (a + c, b + d)</div>\n    <p>then the space is completely intuitive, flat, and commutative.</p>\n    <p><strong>The second world, a non-abelian group:</strong> Now define a new operation <span class=\"math-inline\">∘</span> on the same set <span class=\"math-inline\">S</span>:</p>\n    <div class=\"math-box\">(a, b) ∘ (c, d) = (a + (-1)^b × c , b + d)</div>\n    <p>Are these two worlds the same? No. The second world is non-abelian. If we choose the two elements (1, 1) and (1, 0), then</p>\n    <div class=\"math-box\" style=\"flex-direction: column; gap: 5px;\">\n        <div>(1, 1) ∘ (1, 0) = (1 + (-1)<sup>1</sup> × 1, 1 + 0) = (1 - 1, 1) = (0, 1)</div>\n        <div>(1, 0) ∘ (1, 1) = (1 + (-1)<sup>0</sup> × 1, 0 + 1) = (1 + 1, 1) = (2, 1)</div>\n    </div>\n    <p>Since <span class=\"math-inline\">(0, 1) ≠ (2, 1)</span>, this group is not commutative. Even understanding the inverse element in this new world requires abstract calculation:</p>\n    <div class=\"math-box\">(a, b)<sup>-1</sup> = (-(-1)^b × a , -b)</div>\n    <p>This simple example shows that the human mind can build structures that look identical on the surface but behave quite differently underneath, simply by changing the logic by which their elements combine.</p>\n\n    <h2>3. A Historical Dialectic: Geometry and Algebra Rescue One Another</h2>\n    <p><strong>First phase: geometry tames the monster of imaginary numbers.</strong> When an equation such as <span class=\"math-inline\">x<sup>2</sup> + 1 = 0</span> appeared, the imaginary number <span class=\"math-inline\">i = √-1</span> was born. It seemed to mock physical obviousness: how could the area of a square be negative? Leibniz called it something between being and non-being, and the algebraic mind could not digest it. But geometry came to algebra's aid. With the introduction of the complex plane by Wessel, Argand, and Gauss, multiplication by <span class=\"math-inline\">i</span> became a rotation of 90 degrees in the plane. Geometry made imaginary numbers visible and thinkable.</p>\n    <p><strong>Second phase: algebra frees non-Euclidean geometry from an impasse.</strong> In the nineteenth century, the discovery of non-Euclidean geometries by Lobachevsky and Riemann created a cognitive crisis. In hyperbolic geometry, through a point outside a line one can draw infinitely many parallel lines that never meet the original line. This is impossible for the Euclidean filter of the human mind to imagine. Here a historical inversion occurred: algebra and imaginary numbers now came to the rescue of geometry. To understand this unimaginable space, mathematicians such as Poincare built mathematical models based on complex numbers.</p>\n\n    <h2>4. The Poincare Disk Model and the Visualization of Hyperbolic Geometry</h2>\n    <p>In the Poincare disk model, the entire world is confined inside a unit circle in the complex plane:</p>\n    <div class=\"math-box\">D = { z ∈ C : |z| &lt; 1 }</div>\n    <p>In this world, straight lines, or geodesics, are no longer Euclidean straight lines. They are arcs of circles orthogonal to the boundary of the disk, or diameters passing through the center. If we have a line such as <span class=\"math-inline\">L</span> and a point such as <span class=\"math-inline\">P</span> outside it, we can draw infinitely many hyperbolic line-arcs through <span class=\"math-inline\">P</span> that never meet <span class=\"math-inline\">L</span> inside the disk. In a Mobius transformation, lines that pass through the center of the unit circle are seen exactly like diameters of the disk.</p>\n    <p>According to Felix Klein's Erlangen program, geometry is not merely the study of points; it is the study of symmetry groups. The translation group in flat Euclidean space is abelian, as in <span class=\"math-inline\">(R, +)</span>: it does not matter whether you first go east and then north, or the other way around.</p>\n\n    <div class=\"svg-container\">\n        <svg width=\"500\" height=\"500\" viewBox=\"0 0 500 500\">\n            <circle cx=\"250\" cy=\"250\" r=\"200\" fill=\"#f0f8ff\" stroke=\"#333\" stroke-width=\"3\"/>\n            <path d=\"M 108.6 391.4 A 200 200 0 0 1 391.4 391.4\" fill=\"transparent\" stroke=\"red\" stroke-width=\"4\"/>\n            <text x=\"250\" y=\"360\" fill=\"red\" font-size=\"20\" font-weight=\"bold\">L</text>\n            <circle cx=\"108.6\" cy=\"391.4\" r=\"5\" fill=\"darkred\"/>\n            <text x=\"85\" y=\"415\" fill=\"darkred\" font-size=\"16\">A</text>\n            <circle cx=\"391.4\" cy=\"391.4\" r=\"5\" fill=\"darkred\"/>\n            <text x=\"400\" y=\"415\" fill=\"darkred\" font-size=\"16\">B</text>\n            <circle cx=\"250\" cy=\"250\" r=\"5\" fill=\"black\"/>\n            <text x=\"235\" y=\"240\" font-size=\"22\" font-weight=\"bold\">P</text>\n            <line x1=\"391.4\" y1=\"108.6\" x2=\"108.6\" y2=\"391.4\" stroke=\"blue\" stroke-width=\"2\" stroke-dasharray=\"6,6\"/>\n            <line x1=\"108.6\" y1=\"108.6\" x2=\"391.4\" y2=\"391.4\" stroke=\"blue\" stroke-width=\"2\" stroke-dasharray=\"6,6\"/>\n            <line x1=\"50\" y1=\"250\" x2=\"450\" y2=\"250\" stroke=\"#27ae60\" stroke-width=\"2\"/>\n            <line x1=\"108.6\" y1=\"250\" x2=\"391.4\" y2=\"250\" stroke=\"#27ae60\" stroke-width=\"2\" transform=\"rotate(20 250 250)\"/>\n            <line x1=\"108.6\" y1=\"250\" x2=\"391.4\" y2=\"250\" stroke=\"#27ae60\" stroke-width=\"2\" transform=\"rotate(-20 250 250)\"/>\n            <line x1=\"250\" y1=\"50\" x2=\"250\" y2=\"450\" stroke=\"gray\" stroke-width=\"1.5\" stroke-dasharray=\"4,4\"/>\n        </svg>\n        <div class=\"legend\">\n            <div><div class=\"color-box\" style=\"border: 1px solid #333; border-radius: 50%;\"></div> Boundary of the universe, infinity</div>\n            <div><div class=\"color-box\" style=\"background-color: red;\"></div> Given line L</div>\n            <div><div class=\"color-box\" style=\"background-color: blue;\"></div> Limiting parallels</div>\n            <div><div class=\"color-box\" style=\"background-color: #27ae60;\"></div> Ultra-parallels, infinitely many</div>\n            <div><div class=\"color-box\" style=\"background-color: darkred; border-radius: 50%;\"></div> Ideal points A and B</div>\n        </div>\n        <p style=\"font-size: 0.95rem; color: #566170; margin-top: 15px;\"><strong>Geometric visualization:</strong> From point P one can draw infinitely many green lines that are parallel to the red line L inside the disk, meaning they never intersect it. The blue dotted lines are limiting parallels, which meet L only at infinity, at points A and B. This is a visual refutation of Euclid's fifth postulate.</p>\n    </div>\n\n    <h2>5. The Symmetry Group of Hyperbolic Geometry: Linking Function Composition and Matrix Multiplication</h2>\n    <p>According to Klein's Erlangen program, hyperbolic geometry is governed by a non-abelian group of Mobius transformations:</p>\n    <div class=\"math-box\"><span class=\"math-inline\">f(z) = </span><div class=\"frac\"><span class=\"top\">az + b</span><span>b̄z + ā</span></div></div>\n    <p>with the condition <span class=\"math-inline\">|a|² - |b|² = 1</span>. To prove that this group is equivalent to the special unitary group <span class=\"math-inline\">SU(1,1)</span>, we show that the composition of two functions <span class=\"math-inline\">f₁ ∘ f₂</span> is exactly equivalent to multiplying their corresponding matrices.</p>\n    <p>Suppose we have two matrices <span class=\"math-inline\">M₁</span> and <span class=\"math-inline\">M₂</span>:</p>\n    <div class=\"math-box\">M₁ = <table class=\"matrix\"><tr><td>a₁</td><td>b₁</td></tr><tr><td>b̄₁</td><td>ā₁</td></tr></table>, M₂ = <table class=\"matrix\"><tr><td>a₂</td><td>b₂</td></tr><tr><td>b̄₂</td><td>ā₂</td></tr></table></div>\n    <p>The composite function <span class=\"math-inline\">f₁(f₂(z))</span> is computed by substituting one fraction into the other:</p>\n    <div class=\"math-box\">f₁(f₂(z)) = <div class=\"frac\" style=\"min-width:200px;\"><span class=\"top\" style=\"padding-bottom: 8px;\">a₁ <div class=\"frac\" style=\"font-size: 0.85em; min-width:120px;\"><span class=\"top\">a₂ z + b₂</span><span>b̄₂ z + ā₂</span></div> + b₁</span><span style=\"padding-top: 8px;\">b̄₁ <div class=\"frac\" style=\"font-size: 0.85em; min-width:120px;\"><span class=\"top\">a₂ z + b₂</span><span>b̄₂ z + ā₂</span></div> + ā₁</span></div></div>\n    <p>Multiplying numerator and denominator by <span class=\"math-inline\">(b̄₂ z + ā₂)</span> and factoring out <span class=\"math-inline\">z</span>, the fraction becomes</p>\n    <div class=\"math-box\">f₁(f₂(z)) = <div class=\"frac\" style=\"min-width:200px;\"><span class=\"top\">(a₁ a₂ + b₁ b̄₂) z + (a₁ b₂ + b₁ ā₂)</span><span>(b̄₁ a₂ + ā₁ b̄₂) z + (b̄₁ b₂ + ā₁ ā₂)</span></div></div>\n    <p>Now multiply the matrices:</p>\n    <div class=\"math-box\" style=\"font-size: 1.05rem;\">M₁ × M₂ = <table class=\"matrix\"><tr><td>a₁</td><td>b₁</td></tr><tr><td>b̄₁</td><td>ā₁</td></tr></table> × <table class=\"matrix\"><tr><td>a₂</td><td>b₂</td></tr><tr><td>b̄₂</td><td>ā₂</td></tr></table> = <table class=\"matrix\"><tr><td>a₁ a₂ + b₁ b̄₂</td><td>a₁ b₂ + b₁ ā₂</td></tr><tr><td>b̄₁ a₂ + ā₁ b̄₂</td><td>b̄₁ b₂ + ā₁ ā₂</td></tr></table></div>\n    <p>Comparing the coefficients of the resulting matrix with the simplified function, we see that they coincide exactly. Since multiplication of these matrices is not commutative, <span class=\"math-inline\">M₁M₂ ≠ M₂M₁</span>, the group of Mobius transformations of hyperbolic space is also non-abelian. In physics and geometry, this non-commutativity expresses curvature in space.</p>\n\n    <h2>6. Philosophical Synthesis: Breaking the A Priori Pressure with Structuralist Tools</h2>\n    <p>As we have seen, human intuition is intrinsically Euclidean. Even when it tries to display hyperbolic space in the Poincare disk, it squeezes that space into an Euclidean circle on paper or on a screen. In this respect, Kant was right that our cognitive filter seems unchangeable.</p>\n    <p>But the fundamental criticism of Kant, drawing on Humean empiricism and the power of mathematics, is that Kant forgot that induction and evolution built our a priori spectacles for survival in a specific environment, not for understanding the whole cosmos.</p>\n    <p>Using algebra and group theory, we have been able to escape from within this absolutely Euclidean cognitive filter. When we cannot visualize curved space, we transfer it into complex numbers and non-abelian matrices and calculate it.</p>\n    <p>The uniqueness of the structure <span class=\"math-inline\">(R, +)</span> as the only connected one-dimensional Lie group shows that, because of our linear experience of space and time, the mind accepts this simple abelian structure as the default model of the world. But the cosmos is not required to obey our mental models. By introducing more complex structures, mathematics has shown us that the logical and structural truths of the universe exceed empirical conventions and intersubjective human agreements.</p>\n\n    <h2>Conclusion</h2>\n    <p>Mathematics is not merely a tool for measurement; it is a liberating mechanism for human reason. When our geometric intuition reached an impasse before non-Euclidean spaces, algebra, non-abelian groups, and imaginary numbers rescued geometry. The uniqueness of <span class=\"math-inline\">(R, +)</span> as the only connected one-dimensional group shows that the mind takes this simple abelian structure as the world's default, but the universe need not follow the limited models of our minds. This is one of the grandest epistemological achievements of humanity: breaking the a priori pressure of the mind through structuralist formalism.</p>\n\n    <h2>References</h2>\n    <ol class=\"references\">\n        <li>Anderson, J. W. (2005). <em>Hyperbolic Geometry</em> (2nd ed.). Springer.</li>\n        <li>Artin, M. (1991). <em>Algebra</em>. Prentice Hall.</li>\n        <li>Coxeter, H. S. M. (1998). <em>Non-Euclidean Geometry</em> (6th ed.). Mathematical Association of America.</li>\n        <li>Kant, I. (1998). <em>Critique of Pure Reason</em> (P. Guyer & A. W. Wood, Trans.). Cambridge University Press. Original work published 1781/1787.</li>\n        <li>Klein, F. (1893). A comparative review of recent researches in geometry. <em>Bulletin of the New York Mathematical Society, 2</em>, 215-249.</li>\n        <li>Needham, T. (1997). <em>Visual Complex Analysis</em>. Oxford University Press.</li>\n        <li>Riemann, B. (2016). <em>On the Hypotheses Which Lie at the Foundations of Geometry</em> (W. K. Clifford, Trans.). In J. Stillwell (Ed.), <em>Sources of Hyperbolic Geometry</em>. American Mathematical Society. Original lecture delivered 1854.</li>\n        <li>Stillwell, J. (1996). <em>Sources of Hyperbolic Geometry</em>. American Mathematical Society.</li>\n    </ol>\n    <p class=\"author-credit\" dir=\"ltr\"><strong>Author:</strong> Mohammad Hossein Barati</p>\n\n\n</div>\n</body>\n</html>", "popper": "<!DOCTYPE html>\n<html lang=\"en\" dir=\"ltr\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>The Paradox of Conjunction and the Insufficiency of a Demarcation Criterion Independent of Meaning</title>\n    <style>\n        :root {\n            --bg-color: transparent;\n            --paper-color: transparent;\n            --text-color: #243044;\n            --heading-color: #17324d;\n            --accent-color: #2563a8;\n        }\n        body {\n            font-family: Tahoma, Arial, sans-serif;\n            background: transparent;\n            color: var(--text-color);\n            line-height: 1.78;\n            margin: 0;\n            padding: 22px 30px 70px;\n        }\n        .container {\n            max-width: 980px;\n            margin: 0 auto;\n            padding: 0;\n        }\n        h1 { color: var(--heading-color); font-size: 2rem; margin: 0 0 10px; }\n        h2 { color: var(--accent-color); border-bottom: 2px solid #d9e3ef; padding-bottom: 6px; margin-top: 40px; }\n        h3 { color: var(--heading-color); margin-top: 30px; }\n        p { text-align: justify; margin-bottom: 15px; font-size: 1.05rem; }\n        ul, ol { font-size: 1.05rem; line-height: 1.78; margin-bottom: 15px; }\n        .abstract {\n            background-color: #edf7ff;\n            padding: 20px;\n            border-left: 5px solid var(--accent-color);\n            border-radius: 5px;\n            margin-bottom: 30px;\n            font-style: italic;\n        }\n        .svg-container {\n            text-align: center;\n            margin: 40px 0;\n            background-color: #f8fafc;\n            padding: 20px;\n            border: 1px solid #d9e3ef;\n            border-radius: 8px;\n        }\n        .legend {\n            display: flex;\n            justify-content: center;\n            flex-wrap: wrap;\n            gap: 18px;\n            margin-top: 15px;\n            font-size: 0.9rem;\n        }\n        .legend div { display: flex; align-items: center; gap: 8px; }\n        .color-box { width: 15px; height: 15px; border-radius: 3px; }\n        .math-box {\n            text-align: center;\n            margin: 25px 0;\n            font-family: \"Times New Roman\", Times, serif;\n            direction: ltr;\n            font-size: 1.25rem;\n            overflow-x: auto;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            gap: 10px;\n            flex-wrap: wrap;\n        }\n        .math-inline {\n            font-family: \"Times New Roman\", Times, serif;\n            direction: ltr;\n            display: inline-block;\n            font-style: italic;\n        }\n        .frac {\n            display: inline-block;\n            vertical-align: middle;\n            text-align: center;\n            margin: 0 5px;\n            user-select: none;\n        }\n        .frac span { display: block; padding: 0 5px; }\n        .frac .top { border-bottom: 1px solid #000; }\n        .matrix {\n            display: inline-table;\n            vertical-align: middle;\n            border-left: 2px solid #000;\n            border-right: 2px solid #000;\n            border-radius: 6px;\n            margin: 0 5px;\n            border-collapse: collapse;\n            user-select: none;\n        }\n        .matrix td { padding: 4px 12px; text-align: center; }\n        @media (max-width: 760px) {\n            body { padding: 18px 18px 56px; }\n            h1 { font-size: 1.55rem; }\n            .math-box { font-size: 1.05rem; }\n        }\n\n        .references {\n            margin-top: 12px;\n            padding-left: 28px;\n            font-size: 0.98rem;\n            line-height: 1.65;\n        }\n        .references li {\n            margin-bottom: 8px;\n            text-align: left;\n        }\n    \n        .author-credit {\n            margin-top: 22px;\n            font-size: 1rem;\n            font-weight: 500;\n        }\n    \n        /* mobile-layout-fix-article */\n        svg { max-width: 100%; height: auto; }\n        @media (max-width: 560px) {\n            body {\n                padding: 14px 12px 48px !important;\n                line-height: 1.7;\n                overflow-x: hidden;\n            }\n            .container { max-width: 100%; }\n            h1 {\n                font-size: 1.34rem !important;\n                line-height: 1.35;\n            }\n            h2 {\n                font-size: 1.08rem;\n                margin-top: 28px;\n            }\n            h3 { font-size: 1rem; }\n            p, ul, ol { font-size: 0.98rem !important; }\n            .abstract,\n            .svg-container { padding: 14px !important; }\n            .math-box {\n                font-size: 0.98rem !important;\n                justify-content: flex-start;\n            }\n        }\n\n        /* mobile-native-v3-article */\n        @media (max-width: 640px) {\n            body {\n                padding: 16px 14px 56px !important;\n                line-height: 1.75;\n                overflow-x: hidden;\n                background: transparent;\n            }\n            .container {\n                width: 100%;\n                max-width: 100%;\n                margin: 0;\n            }\n            h1 {\n                font-size: 1.36rem !important;\n                line-height: 1.35;\n                margin-bottom: 10px;\n            }\n            h2 {\n                font-size: 1.08rem;\n                line-height: 1.45;\n                margin-top: 30px;\n                padding-bottom: 7px;\n            }\n            h3 {\n                font-size: 0.98rem;\n                line-height: 1.45;\n            }\n            p, ul, ol {\n                font-size: 0.98rem !important;\n            }\n            p {\n                text-align: start;\n            }\n            .abstract,\n            .svg-container {\n                padding: 14px !important;\n                border-radius: 8px !important;\n            }\n            .legend {\n                justify-content: flex-start !important;\n                gap: 10px !important;\n            }\n            .math-box {\n                font-size: 0.98rem !important;\n                justify-content: flex-start !important;\n                overflow-x: auto;\n                flex-wrap: nowrap;\n                padding-bottom: 4px;\n            }\n            svg {\n                max-width: 100%;\n                height: auto;\n            }\n            .references {\n                padding-inline-start: 22px !important;\n                overflow-wrap: anywhere;\n            }\n        }\n\n\n        /* mobile-doc-edge-safe-v13 */\n        @media (max-width: 820px) {\n            html,\n            body {\n                width: 100%;\n                max-width: 100%;\n                overflow-x: hidden !important;\n            }\n            *,\n            *::before,\n            *::after {\n                box-sizing: border-box;\n            }\n        }\n\n</style>\n</head>\n<body>\n<div class=\"container\">\n    <h1>The Paradox of Conjunction and the Insufficiency of a Demarcation Criterion Independent of Meaning</h1>\n    <h3>A Semantic and Methodological Critique of Karl Popper's View</h3>\n\n    <div class=\"abstract\">\n        <strong>Abstract:</strong><br>\n        Karl Popper introduced falsifiability as the criterion for demarcating science from pseudoscience without committing himself to a theory of meaning. This article argues that such independence is unstable. It shows that any demarcation criterion formulated independently of a minimal semantic condition collapses when it faces molecular propositions and complex scientific theories. Through an analysis of the paradox of conjunction, the article shows that, in the absence of semantic limits on admissible propositions, indefinitely many untestable and empirically irrelevant propositions can be conjoined to an organized theory without changing its observational consequences. To solve this problem, the article defends a weakened notion of confirmability: not as a guarantee of truth, but as a necessary condition for logical and empirical assessability. This semantic-methodological constraint is immune to self-refutation and restores the effectiveness of demarcation criteria at the level of real scientific theories.\n    </div>\n\n    <p><strong>Keywords:</strong> demarcation problem, Popper, paradox of conjunction, confirmability, logical meaning, pseudoscience</p>\n\n    <h2>1. Introduction</h2>\n    <p>The problem of demarcating science from pseudoscience is one of the fundamental problems of twentieth-century philosophy of science. Among the proposed answers, Karl Popper's criterion of falsifiability holds a distinguished place. Popper tried to distinguish empirical science from metaphysics without committing himself to positivist theories of meaning. For him, metaphysical statements may be meaningful, rational, and even scientifically inspiring, even though they are not scientific.</p>\n    <p>This article challenges the coherence of that position. It argues that any demarcation criterion that takes itself to be independent of a theory of meaning may work at the level of atomic statements, but it collapses when it confronts molecular statements and complex theoretical structures. This collapse appears most clearly as the paradox of conjunction.</p>\n\n    <h2>2. Reconstructing Confirmability</h2>\n    <p>A basic distinction between verifiability and confirmability is essential. Verifiability requires certainty and direct empirical fulfillment, while confirmability is a weaker concept that includes both the strengthening of a hypothesis and the failure to falsify it.</p>\n    <p>Confirmability can be analyzed in three forms:</p>\n    <ol>\n        <li><strong>Direct confirmation:</strong> the direct fit between a statement and observational data.</li>\n        <li><strong>Indirect confirmation through the non-falsification of universal statements:</strong> the strengthening of a general hypothesis when attempts to falsify it fail.</li>\n        <li><strong>Indirect confirmation through observable consequences:</strong> if a hypothesis leads to observable consequences and those consequences are not falsified, the probability of the hypothesis is strengthened.</li>\n    </ol>\n    <p>This analysis shows that even within a broadly Popperian framework, a minimal notion of confirmation is unavoidable.</p>\n\n    <h2>3. The Paradox of Conjunction and Molecular Theories</h2>\n    <p>Suppose we have a set of propositions:</p>\n    <div class=\"math-box\">T₁, T₂, T₃, T₄</div>\n    <p>and these propositions deductively lead to an observable result <span class=\"math-inline\">O</span>:</p>\n    <div class=\"math-box\">T₁, T₂, T₃, T₄ &#10230; O</div>\n    <p>According to classical logic, for any arbitrary set of propositions <span class=\"math-inline\">M₁, M₂, ..., Mₙ</span>, we have:</p>\n    <div class=\"math-box\" style=\"flex-direction: column;\">\n        <div>T₁, T₂, T₃, T₄ &#10230; O</div>\n        <div style=\"font-size: 0.8em; margin: 10px 0;\">therefore</div>\n        <div>T₁, T₂, T₃, T₄, M₁, M₂, ..., Mₙ &#10230; O</div>\n    </div>\n    <p>This is the paradox of conjunction. It shows that any number of untestable or metaphysical statements can be conjoined to a theory without changing its observational consequences.</p>\n    <p>If falsifiability alone is the criterion of demarcation, such a theory will still count as scientific, even if most of its content consists of non-scientific propositions.</p>\n\n    <h2>4. The Necessity of a Semantic Constraint</h2>\n    <p>The paradox of conjunction can be solved only if a semantic condition for the admission of propositions into a theory is accepted. If a proposition has no capacity for direct or indirect confirmation, then it lacks logical-empirical meaning.</p>\n    <p>Such a proposition:</p>\n    <ul>\n        <li>is not capable of truth or falsity in an empirical-theoretical role,</li>\n        <li>plays no epistemic role in the theory,</li>\n        <li>and cannot meaningfully participate in logical conjunctions.</li>\n    </ul>\n    <p>Logical meaninglessness in this sense is not the same as conceptual or practical meaninglessness.</p>\n\n    <h2>5. Case Study: Adler's Inferiority-Complex Theory</h2>\n    <p>Adler's theory of the inferiority complex is a clear example of this problem. The central proposition of the theory is:</p>\n    <div class=\"math-box\">T₁: All human beings have an inferiority complex.</div>\n    <p>This proposition is formulated in such a way that every possible human behavior can be interpreted as confirming it. Striving to overcome difficulty and avoiding difficulty are both interpreted in favor of the same statement.</p>\n    <p>As a result, <span class=\"math-inline\">T₁</span> is not only unfalsifiable; it is also unconfirmable. Although secondary propositions may have observable consequences, the central proposition lacks logical-empirical meaning and turns the theory into pseudoscience.</p>\n\n    <h2>6. Is the Principle of Confirmability Self-Refuting?</h2>\n    <p>A common objection is that semantic principles themselves cannot be proven or empirically tested. This objection misunderstands the status of the principle defended here.</p>\n    <p>The principle of confirmability does not claim necessary truth. It is a regulative methodological principle. Its validity depends on its power to solve real problems in the philosophy of science. If it were shown that an unconfirmable proposition plays an epistemic and necessary role in a scientific theory, the principle would be weakened.</p>\n\n    <h2>7. Conclusion</h2>\n    <p>This article has shown that demarcation criteria independent of a theory of meaning are unstable. The paradox of conjunction reveals that falsifiability alone cannot prevent non-scientific content from entering apparently scientific theories. For this reason, a minimal semantic constraint based on confirmability is necessary.</p>\n    <p>Confirmability, not as a guarantee of truth but as a condition for logical-empirical assessability, establishes a necessary connection between meaning and demarcation.</p>\n\n    <h2>References</h2>\n    <ol class=\"references\">\n        <li>Ayer, A. J. (1936). <em>Language, Truth and Logic</em>. Victor Gollancz.</li>\n        <li>Carnap, R. (1936). Testability and meaning. <em>Philosophy of Science, 3</em>(4), 419-471.</li>\n        <li>Hempel, C. G. (1950). Problems and changes in the empiricist criterion of meaning. <em>Revue Internationale de Philosophie, 4</em>(11), 41-63.</li>\n        <li>Lakatos, I. (1978). <em>The Methodology of Scientific Research Programmes</em>. Cambridge University Press.</li>\n        <li>Popper, K. R. (1959). <em>The Logic of Scientific Discovery</em>. Hutchinson.</li>\n        <li>Popper, K. R. (1963). <em>Conjectures and Refutations: The Growth of Scientific Knowledge</em>. Routledge & Kegan Paul.</li>\n        <li>Popper, K. R. (1974). Replies to my critics. In P. A. Schilpp (Ed.), <em>The Philosophy of Karl Popper</em>. Open Court.</li>\n        <li>Thagard, P. R. (1978). Why astrology is a pseudoscience. <em>PSA: Proceedings of the Biennial Meeting of the Philosophy of Science Association, 1978</em>(1), 223-234.</li>\n    </ol>\n    <p class=\"author-credit\" dir=\"ltr\"><strong>Author:</strong> Mohammad Hossein Barati</p>\n\n\n</div>\n</body>\n</html>"}, "tools": {"pdisk": "<!DOCTYPE html>\n<html lang=\"en\" dir=\"ltr\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>Hyperbolic Geometry and Mobius Transformation Composition</title>\n    <style>\n        body { font-family: Tahoma, Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }\n        .container { display: flex; gap: 20px; max-width: 1300px; width: 100%; }\n        .canvas-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; flex-grow: 1; }\n        canvas { background-color: #fff; border-radius: 10px; border: 1px solid #ddd; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); max-width: 100%; }\n        .controls { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; flex-shrink: 0; height: fit-content; }\n        .box { background: #f9f9f9; padding: op: 8px !important;\n                left: 8px !important;\n                right: auto !important;\n                bottom: auto !important;\n                z-index: 80 !important;\n                display: inline-block !important;\n                width: auto !important;\n                min-width: 0 !important;\n                max-width: min(58vw, 230px) !important;\n                min-height: 0 !important;\n                max-height: none !important;\n                padding: 6px 8px !important;\n                margin: 0 !important;\n                overflow: visible !important;\n                border-radius: 11px !important;\n                border-left: 3px solid #4CAF50 !important;\n                border-right: 0 !important;\n                background: rgba(255, 255, 255, 0.93) !important;\n                box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14) !important;\n                direction: ltr !important;\n            }\n            body > .mobile-formula-card h3 {\n                display: none !important;\n            }\n            body > .mobile-formula-card math {\n                display: inline-block !important;\n                width: auto !important;\n                max-width: none !important;\n                font-size: 1.9rem !important;\n                line-height: 1.08 !important;\n                margin: 0 !important;\n                overflow: visible !important;\n                white-space: nowrap !important;\n                text-align: left !important;\n            }\n        }\n        @media (max-width: 430px) {\n            .controls {\n                height: 21dvh !important;\n                max-height: 21dvh !important;\n                padding-inline: 9px !important;\n            }\n            body > .mobile-formula-card {\n                top: 7px !important;\n                left: 7px !important;\n                max-width: min(62vw, 220px) !important;\n                padding: 6px 8px !important;\n            }\n            body > .mobile-formula-card math {\n                font-size: 1.55rem !important;\n            }\n        }\n\n\n\n        /* mobile-pdisk-compact-control-content-v11 */\n        @media (max-width: 820px) {\n            .controls {\n                height: 21dvh !important;\n                max-height: 21dvh !important;\n                padding: 18px 8px calc(8px + env(safe-area-inset-bottom)) !important;\n                font-size: 0.62rem !important;\n                line-height: 1.15 !important;\n                scrollbar-width: thin;\n            }\n            .controls::-webkit-scrollbar {\n                width: 5px;\n            }\n            .sheet-grip {\n                width: 38px !important;\n                height: 4px !important;\n                margin: -10px auto 7px !important;\n            }\n            .controls > .box,\n            .controls > .box:not(:first-of-type),\n            .controls > .box:first-of-type {\n                width: 100% !important;\n                padding: 6px !important;\n                margin: 0 0 6px 0 !important;\n                border-radius: 8px !important;\n                border-left-width: 2px !important;\n                border-right-width: 2px !important;\n                font-size: 0.62rem !important;\n                line-height: 1.15 !important;\n            }\n            .controls .box h3,\n            .controls > .box h3,\n            .controls > .box:first-of-type h3 {\n                display: block !important;\n                font-size: 0.64rem !important;\n                line-height: 1.15 !important;\n                margin: 0 0 4px 0 !important;\n            }\n            .controls .input-row {\n                display: grid !important;\n                grid-template-columns: minmax(0, 1fr) !important;\n                gap: 3px !important;\n                margin: 0 0 5px 0 !important;\n                font-size: 0.60rem !important;\n                line-height: 1.15 !important;\n            }\n            .controls .input-row label {\n                display: block !important;\n                width: 100% !important;\n                margin: 0 !important;\n                font-size: 0.60rem !important;\n                line-height: 1.15 !important;\n            }\n            .controls .input-row div {\n                font-size: 0.60rem !important;\n                line-height: 1.15 !important;\n            }\n            .controls input[type=\"range\"] {\n                width: 100% !important;\n                min-height: 18px !important;\n                height: 18px !important;\n                margin: 0 !important;\n            }\n            .controls input[type=\"number\"] {\n                width: 48px !important;\n                min-height: 22px !important;\n                height: 22px !important;\n                padding: 1px 3px !important;\n                font-size: 0.62rem !important;\n                border-radius: 4px !important;\n            }\n            .controls button {\n                width: 100% !important;\n                min-height: 24px !important;\n                padding: 4px 6px !important;\n                margin: 0 0 4px 0 !important;\n                border-radius: 6px !important;\n                font-size: 0.62rem !important;\n                line-height: 1.15 !important;\n            }\n            .controls .math-small {\n                font-size: 0.68rem !important;\n                line-height: 1.1 !important;\n                margin: 2px 0 5px 0 !important;\n            }\n        }\n        @media (max-width: 430px) {\n            .controls {\n                height: 20dvh !important;\n                max-height: 20dvh !important;\n                padding: 17px 7px calc(7px + env(safe-area-inset-bottom)) !important;\n            }\n            .controls > .box,\n            .controls > .box:not(:first-of-type),\n            .controls > .box:first-of-type {\n                padding: 5px !important;\n                margin-bottom: 5px !important;\n            }\n            .controls .box h3,\n            .controls > .box h3 {\n                font-size: 0.60rem !important;\n            }\n            .controls .input-row,\n            .controls .input-row label,\n            .controls .input-row div,\n            .controls button,\n            .controls input[type=\"number\"] {\n                font-size: 0.56rem !important;\n            }\n        }\n\n\n\n        /* mobile-pdisk-control-content-v12-slightly-larger */\n        @media (max-width: 820px) {\n            .controls {\n                height: 21dvh !important;\n                max-height: 21dvh !important;\n                padding: 19px 9px calc(9px + env(safe-area-inset-bottom)) !important;\n                font-size: 0.70rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls > .box,\n            .controls > .box:not(:first-of-type),\n            .controls > .box:first-of-type {\n                padding: 7px !important;\n                margin: 0 0 7px 0 !important;\n                border-radius: 9px !important;\n                font-size: 0.70rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls .box h3,\n            .controls > .box h3,\n            .controls > .box:first-of-type h3 {\n                font-size: 0.72rem !important;\n                line-height: 1.2 !important;\n                margin: 0 0 5px 0 !important;\n            }\n            .controls .input-row {\n                gap: 4px !important;\n                margin: 0 0 6px 0 !important;\n                font-size: 0.68rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls .input-row label,\n            .controls .input-row div {\n                font-size: 0.68rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls input[type=\"range\"] {\n                min-height: 22px !important;\n                height: 22px !important;\n            }\n            .controls input[type=\"number\"] {\n                width: 54px !important;\n                min-height: 26px !important;\n                height: 26px !important;\n                padding: 2px 4px !important;\n                font-size: 0.70rem !important;\n            }\n            .controls button {\n                min-height: 28px !important;\n                padding: 5px 7px !important;\n                margin: 0 0 5px 0 !important;\n                border-radius: 7px !important;\n                font-size: 0.70rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls .math-small {\n                font-size: 0.74rem !important;\n                line-height: 1.15 !important;\n                margin: 3px 0 6px 0 !important;\n            }\n        }\n        @media (max-width: 430px) {\n            .controls {\n                height: 20dvh !important;\n                max-height: 20dvh !important;\n                padding: 18px 8px calc(8px + env(safe-area-inset-bottom)) !important;\n            }\n            .controls > .box,\n            .controls > .box:not(:first-of-type),\n            .controls > .box:first-of-type {\n                padding: 6px !important;\n                margin-bottom: 6px !important;\n            }\n            .controls .box h3,\n            .controls > .box h3 {\n                font-size: 0.66rem !important;\n            }\n            .controls .input-row,\n            .controls .input-row label,\n            .controls .input-row div,\n            .controls button,\n            .controls input[type=\"number\"] {\n                font-size: 0.64rem !important;\n            }\n            .controls button {\n                min-height: 27px !important;\n            }\n            .controls input[type=\"number\"] {\n                min-height: 25px !important;\n                height: 25px !important;\n            }\n        }\n\n\n\n        /* mobile-pdisk-panel-edge-v13 */\n        @media (max-width: 820px) {\n            html,\n            body {\n                width: 100%;\n                max-width: 100%;\n                overflow-x: hidden !important;\n            }\n            *,\n            *::before,\n            *::after {\n                box-sizing: border-box;\n            }\n            .container,\n            .canvas-container,\n            .controls {\n                max-width: 100% !important;\n                min-width: 0 !important;\n            }\n            .controls {\n                height: 23dvh !important;\n                max-height: 23dvh !important;\n            }\n            .canvas-container {\n                padding-left: max(12px, env(safe-area-inset-left)) !important;\n                padding-right: max(12px, env(safe-area-inset-right)) !important;\n                padding-bottom: 78px !important;\n                overflow-x: hidden !important;\n            }\n            canvas {\n                max-width: calc(100vw - 24px) !important;\n            }\n        }\n        @media (max-width: 430px) {\n            .controls {\n                height: 22dvh !important;\n                max-height: 22dvh !important;\n            }\n            .canvas-container {\n                padding-left: max(10px, env(safe-area-inset-left)) !important;\n                padding-right: max(10px, env(safe-area-inset-right)) !important;\n            }\n            canvas {\n                max-width: calc(100vw - 20px) !important;\n            }\n        }\n\n</style>\n</head>\n<body>\n\n<div class=\"container\">\n    <div class=\"controls\">\n        \n        <!-- فرمول اصلی موبیوس برگردانده شد -->\n        <div class=\"box\">\n            <h3>Mobius Transformation Formula</h3>\n            <math>\n                <mrow>\n                    <mi>f</mi><mo>(</mo><mi>z</mi><mo>)</mo><mo>=</mo>\n                    <mfrac>\n                        <mrow><mi mathvariant=\"normal\">a</mi><mi>z</mi><mo>+</mo><mi mathvariant=\"normal\">b</mi></mrow>\n                        <mrow><mover><mi mathvariant=\"normal\">b</mi><mo>¯</mo></mover><mi>z</mi><mo>+</mo><mover><mi mathvariant=\"normal\">a</mi><mo>¯</mo></mover></mrow>\n                    </mfrac>\n                </mrow>\n            </math>\n        </div>\n\n        <div class=\"box\" style=\"border-right-color: #2196F3;\">\n            <h3>1. Geometric Parameters</h3>\n            <div class=\"input-row\">\n                <label>Zoom:</label>\n                <input type=\"range\" id=\"sl_zoom\" min=\"40\" max=\"350\" value=\"150\">\n            </div>\n            <div class=\"input-row\">\n                <label>Center distance (d): <span id=\"val_d\">2.00</span></label>\n                <input type=\"range\" id=\"sl_d\" min=\"1.01\" max=\"5.0\" step=\"0.01\" value=\"2.0\">\n            </div>\n            <div class=\"input-row\">\n                <label>Angle (θ): <span id=\"val_theta\">45°</span></label>\n                <input type=\"range\" id=\"sl_theta\" min=\"0\" max=\"360\" value=\"45\">\n            </div>\n            <button id=\"btnAdd\" style=\"background: #2196F3;\">Add geodesic</button>\n            <button id=\"btnToggleGuides\" class=\"btn-toggle\">Hide dashed guides</button>\n        </div>\n\n        <div class=\"box\" id=\"box_t1\" style=\"border-right-color: #FF9800;\">\n            <h3>2. Current Mobius Transformation (T1)</h3>\n            <div class=\"input-row\">\n                <label>a1 (real, imaginary):</label>\n                <div><input type=\"number\" id=\"a_r\" value=\"1\" step=\"0.1\"> + i <input type=\"number\" id=\"a_i\" value=\"0\" step=\"0.1\"></div>\n            </div>\n            <div class=\"input-row\">\n                <label>b1 (real, imaginary):</label>\n                <div><input type=\"number\" id=\"b_r\" value=\"0\" step=\"0.1\"> + i <input type=\"number\" id=\"b_i\" value=\"0\" step=\"0.1\"></div>\n            </div>\n            <button id=\"btnTransform\" style=\"background: #FF9800;\">Apply T1</button>\n        </div>\n\n        <div class=\"box\" style=\"border-right-color: #8e44ad;\">\n            <h3>3. Compose with a New Transformation (T2)</h3>\n            <math class=\"math-small\">\n                <mrow><msub><mi>T</mi><mi>new</mi></msub><mo>=</mo><msub><mi>T</mi><mn>2</mn></msub><mo>∘</mo><msub><mi>T</mi><mn>1</mn></msub></mrow>\n            </math>\n            <div class=\"input-row\">\n                <label>a2 (real, imaginary):</label>\n                <div><input type=\"number\" id=\"a2_r\" value=\"1\" step=\"0.1\"> + i <input type=\"number\" id=\"a2_i\" value=\"0\" step=\"0.1\"></div>\n            </div>\n            <div class=\"input-row\">\n                <label>b2 (real, imaginary):</label>\n                <div><input type=\"number\" id=\"b2_r\" value=\"0\" step=\"0.1\"> + i <input type=\"number\" id=\"b2_i\" value=\"0\" step=\"0.1\"></div>\n            </div>\n            <button id=\"btnCompose\" class=\"btn-compose\">Compose T2 with T1 and apply</button>\n        </div>\n\n        <button id=\"btnClear\" class=\"btn-clear\">Clear all</button>\n    </div>\n\n    <div class=\"canvas-container\">\n        <canvas id=\"canvas\" width=\"800\" height=\"800\"></canvas>\n    </div>\n</div>\n\n<script>\n    const canvas = document.getElementById('canvas');\n    const ctx = canvas.getContext('2d');\n    const cx = canvas.width / 2;\n    const cy = canvas.height / 2;\n\n    let geodesics = [];\n    let showGuides = true;\n    const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#3498db', '#1abc9c', '#2c3e50'];\n\n    // توابع ریاضی اعداد مختلط\n    function complexAdd(c1, c2) { return {r: c1.r + c2.r, i: c1.i + c2.i}; }\n    function complexMult(c1, c2) { return {r: c1.r*c2.r - c1.i*c2.i, i: c1.r*c2.i + c1.i*c2.r}; }\n    function complexConj(c) { return {r: c.r, i: -c.i}; }\n    function complexDiv(c1, c2) {\n        let denMag2 = c2.r*c2.r + c2.i*c2.i;\n        if (denMag2 < 1e-10) return {r: 1e5, i: 1e5};\n        return {r: (c1.r*c2.r + c1.i*c2.i)/denMag2, i: (c1.i*c2.r - c1.r*c2.i)/denMag2};\n    }\n\n    function getFullCircle(d, theta_deg) {\n        let theta = theta_deg * Math.PI / 180;\n        let r_circle = Math.sqrt(d*d - 1);\n        let center = { x: d * Math.cos(theta), y: d * Math.sin(theta) };\n        let pts = [];\n        const steps = 400; \n        for (let i = 0; i <= steps; i++) {\n            let t = (2 * Math.PI) * (i / steps);\n            pts.push({ x: center.x + r_circle * Math.cos(t), y: center.y + r_circle * Math.sin(t) });\n        }\n        return { points: pts, center: center };\n    }\n\n    function getCenterLine(center) {\n        let pts = [];\n        for(let i=0; i<=50; i++) pts.push({ x: center.x * (i/50), y: center.y * (i/50) });\n        return pts;\n    }\n\n    function applyMobius(pt, a, b) {\n        let z = {r: pt.x, i: pt.y};\n        let num = complexAdd(complexMult(a, z), b);\n        let den = complexAdd(complexMult(complexConj(b), z), complexConj(a));\n        let res = complexDiv(num, den);\n        return {x: Math.max(-1e5, Math.min(1e5, res.r)), y: Math.max(-1e5, Math.min(1e5, res.i))};\n    }\n\n    function drawPath(pts, R, colorInside, colorOutside, widthInside, widthOutside, dashInside, dashOutside, drawOutside) {\n        let a = {r: parseFloat(document.getElementById('a_r').value), i: parseFloat(document.getElementById('a_i').value)};\n        let b = {r: parseFloat(document.getElementById('b_r').value), i: parseFloat(document.getElementById('b_i').value)};\n        \n        let tPts = pts.map(p => applyMobius(p, a, b));\n        \n        if (drawOutside) {\n            ctx.save();\n            ctx.beginPath();\n            ctx.rect(0, 0, canvas.width, canvas.height); \n            ctx.arc(cx, cy, R, 0, 2*Math.PI, true);\n            ctx.clip(); \n            ctx.beginPath();\n            ctx.moveTo(cx + tPts[0].x*R, cy - tPts[0].y*R);\n            for(let i=1; i<tPts.length; i++) ctx.lineTo(cx + tPts[i].x*R, cy - tPts[i].y*R);\n            ctx.strokeStyle = colorOutside; ctx.lineWidth = widthOutside; ctx.setLineDash(dashOutside); ctx.stroke();\n            ctx.restore();\n        }\n        \n        ctx.save();\n        ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI); ctx.clip(); \n        ctx.beginPath(); ctx.moveTo(cx + tPts[0].x*R, cy - tPts[0].y*R);\n        for(let i=1; i<tPts.length; i++) ctx.lineTo(cx + tPts[i].x*R, cy - tPts[i].y*R);\n        ctx.strokeStyle = colorInside; ctx.lineWidth = widthInside; ctx.setLineDash(dashInside); ctx.stroke();\n        ctx.restore();\n    }\n\n    function draw() {\n        ctx.clearRect(0, 0, canvas.width, canvas.height);\n        let R = parseFloat(document.getElementById('sl_zoom').value);\n        let d = parseFloat(document.getElementById('sl_d').value);\n        let theta = parseFloat(document.getElementById('sl_theta').value);\n        \n        document.getElementById('val_d').innerText = d.toFixed(2);\n        document.getElementById('val_theta').innerText = theta + '°';\n\n        ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI);\n        ctx.fillStyle = '#ffffff'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#2c3e50'; ctx.stroke();\n\n        geodesics.forEach((geo, idx) => {\n            let col = colors[idx % colors.length];\n            if (showGuides) drawPath(geo.centerLine, R, '#9b59b6', '#9b59b6', 3, 1.5, [6, 4], [6, 4], true);\n            drawPath(geo.points, R, col, col, 5, 1.5, [], [6, 4], showGuides);\n        });\n\n        let preview = getFullCircle(d, theta);\n        if (showGuides) drawPath(getCenterLine(preview.center), R, '#9b59b6', '#9b59b6', 3, 1.5, [6, 4], [6, 4], true);\n        drawPath(preview.points, R, '#2ecc71', 'rgba(150, 150, 150, 0.8)', 5, 1.5, [], [6, 4], showGuides);\n    }\n\n    // --- ماژول ترکیب تبدیلات موبیوس ---\n    document.getElementById('btnCompose').addEventListener('click', () => {\n        // دریافت T1\n        let a1 = {r: parseFloat(document.getElementById('a_r').value), i: parseFloat(document.getElementById('a_i').value)};\n        let b1 = {r: parseFloat(document.getElementById('b_r').value), i: parseFloat(document.getElementById('b_i').value)};\n        \n        // دریافت T2\n        let a2 = {r: parseFloat(document.getElementById('a2_r').value), i: parseFloat(document.getElementById('a2_i').value)};\n        let b2 = {r: parseFloat(document.getElementById('b2_r').value), i: parseFloat(document.getElementById('b2_i').value)};\n\n        // محاسبه A = a2*a1 + b2*conj(b1)\n        let term1_A = complexMult(a2, a1);\n        let term2_A = complexMult(b2, complexConj(b1));\n        let A = complexAdd(term1_A, term2_A);\n\n        // محاسبه B = a2*b1 + b2*conj(a1)\n        let term1_B = complexMult(a2, b1);\n        let term2_B = complexMult(b2, complexConj(a1));\n        let B = complexAdd(term1_B, term2_B);\n\n        // جایگذاری در T1 و گرد کردن\n        document.getElementById('a_r').value = A.r.toFixed(3);\n        document.getElementById('a_i').value = A.i.toFixed(3);\n        document.getElementById('b_r').value = B.r.toFixed(3);\n        document.getElementById('b_i').value = B.i.toFixed(3);\n\n        // ریست کردن فرم T2\n        document.getElementById('a2_r').value = 1; document.getElementById('a2_i').value = 0;\n        document.getElementById('b2_r').value = 0; document.getElementById('b2_i').value = 0;\n\n        // هایلایت کردن موقت باکس 2 برای نشان دادن تغییر\n        let box1 = document.getElementById('box_t1');\n        box1.style.backgroundColor = '#fff3e0';\n        setTimeout(() => box1.style.backgroundColor = '#f9f9f9', 500);\n\n        draw();\n    });\n\n    document.getElementById('sl_zoom').addEventListener('input', draw);\n    document.getElementById('sl_d').addEventListener('input', draw);\n    document.getElementById('sl_theta').addEventListener('input', draw);\n    document.getElementById('btnTransfo
