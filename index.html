btn\" data-mode=\"point\">2. Set antipodal points</button>\n        <button class=\"mode-btn\" data-mode=\"circle\">3. Draw great circles</button>\n        \n        <div class=\"help-text\" id=\"help-text\">\n            Drag on the surface to rotate the sphere and inspect its front and back.\n        </div>\n\n        <div id=\"info-panel\">\n            <h3>Calculations for the facing triangle</h3>\n            <p>Angle α: <span id=\"val-alpha\" class=\"val-highlight\"></span></p>\n            <p>Angle β: <span id=\"val-beta\" class=\"val-highlight\"></span></p>\n            <p>Angle γ: <span id=\"val-gamma\" class=\"val-highlight\"></span></p>\n            <p>Area (A): <span id=\"val-area\" class=\"val-highlight\"></span></p>\n        </div>\n\n        <button class=\"clear-btn\" id=\"clear-btn\">Clear canvas</button>\n    </div>\n\n    <canvas id=\"canvas\"></canvas>\n\n    <script>\n        // --- تنظیمات اولیه بوم ---\n        const canvas = document.getElementById('canvas');\n        const ctx = canvas.getContext('2d');\n        let width = window.innerWidth;\n        let height = window.innerHeight;\n        let cx = width / 2;\n        let cy = height / 2;\n        let R = Math.min(width, height) * 0.35; \n        \n        let physicalRadius = 10; \n\n        function resize() {\n            width = window.innerWidth;\n            height = window.innerHeight;\n            canvas.width = width;\n            canvas.height = height;\n            cx = width / 2;\n            cy = height / 2;\n            R = Math.min(width, height) * 0.35;\n        }\n        window.addEventListener('resize', resize);\n        resize();\n\n        document.getElementById('radius-input').addEventListener('input', (e) => {\n            physicalRadius = parseFloat(e.target.value) || 1;\n        });\n\n        let mode = 'orbit'; \n        let rotX = 0; \n        let rotY = 0; \n        \n        let isDragging = false;\n        let lastInput = { x: 0, y: 0 };\n        \n        let pointPairs = []; \n        let greatCircles = []; \n        let facingTriangle = null; \n        \n        let activePointPair = null;\n        let activeCircleNormal = null;\n        let circleStartVec = null;\n\n        const buttons = document.querySelectorAll('.mode-btn');\n        const helpText = document.getElementById('help-text');\n        const helps = {\n            'orbit': 'Drag on the surface to rotate the sphere and inspect its front and back.',\n            'point': 'Click or touch the sphere and drag. A red point and its opposite point will be created.',\n            'circle': 'Draw three intersecting great circles to create a triangle. If the circles pass through one antipodal pair, drawing more circles is allowed.'\n        };\n\n        buttons.forEach(btn => {\n            btn.addEventListener('click', (e) => {\n                buttons.forEach(b => b.classList.remove('active'));\n                e.target.classList.add('active');\n                mode = e.target.getAttribute('data-mode');\n                helpText.innerText = helps[mode];\n            });\n        });\n\n        document.getElementById('clear-btn').addEventListener('click', () => {\n            pointPairs = [];\n            greatCircles = [];\n            facingTriangle = null;\n            document.getElementById('info-panel').style.display = 'none';\n        });\n\n        // --- توابع ریاضیات ---\n        function rotate3D(x, y, z, angleX, angleY) {\n            let x1 = x * Math.cos(angleY) - z * Math.sin(angleY);\n            let z1 = x * Math.sin(angleY) + z * Math.cos(angleY);\n            let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX);\n            let z2 = y * Math.sin(angleX) + z1 * Math.cos(angleX);\n            return { x: x1, y: y2, z: z2 };\n        }\n\n        function getSpherePoint(inputX, inputY) {\n            let dx = inputX - cx;\n            let dy = inputY - cy;\n            let dSq = dx * dx + dy * dy;\n            \n            if (dSq > R * R) {\n                let len = Math.sqrt(dSq);\n                dx = (dx / len) * R;\n                dy = (dy / len) * R;\n                dSq = R * R;\n            }\n            \n            let dz = Math.sqrt(Math.max(0, R * R - dSq));\n            let p1 = rotate3D(dx, dy, dz, -rotX, 0); \n            let p2 = rotate3D(p1.x, p1.y, p1.z, 0, -rotY);\n            \n            let len = Math.sqrt(p2.x*p2.x + p2.y*p2.y + p2.z*p2.z);\n            return { x: p2.x/len, y: p2.y/len, z: p2.z/len };\n        }\n\n        function crossProduct(v1, v2) {\n            return { x: v1.y * v2.z - v1.z * v2.y, y: v1.z * v2.x - v1.x * v2.z, z: v1.x * v2.y - v1.y * v2.x };\n        }\n\n        function dotProduct(v1, v2) {\n            return v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;\n        }\n\n        function normalize(v) {\n            let len = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);\n            if (len === 0) return {x:0, y:0, z:1};\n            return { x: v.x/len, y: v.y/len, z: v.z/len };\n        }\n\n        function multiplyScalar(v, s) {\n            return {x: v.x * s, y: v.y * s, z: v.z * s};\n        }\n\n        // تابع جدید: بررسی می‌کند آیا همه دایره‌های عظیمه از یک محور مشترک عبور کرده‌اند\n        function areCirclesCoaxial(circles) {\n            if (circles.length < 3) return true;\n            \n            let axis = null;\n            // پیدا کردن دو بردار نرمال که با هم موازی نیستند تا محور تقاطع پیدا شود\n            for (let i = 0; i < circles.length - 1; i++) {\n                for (let j = i + 1; j < circles.length; j++) {\n                    let cp = crossProduct(circles[i].normal, circles[j].normal);\n                    let len = Math.sqrt(cp.x*cp.x + cp.y*cp.y + cp.z*cp.z);\n                    if (len > 0.05) { \n                        axis = { x: cp.x/len, y: cp.y/len, z: cp.z/len };\n                        break;\n                    }\n                }\n                if (axis) break;\n            }\n            \n            if (!axis) return true; // اگر تمام دایره‌ها کاملاً روی هم هستند\n            \n            // بررسی هم‌محور بودن سایر دایره‌ها با کمی تلورانس برای لمس انگشت (حدود 4.5 درجه خطای مجاز)\n            for (let i = 0; i < circles.length; i++) {\n                let d = dotProduct(circles[i].normal, axis);\n                if (Math.abs(d) > 0.08) { \n                    return false; // حداقل یک دایره خارج از تقاطع مشترک است\n                }\n            }\n            return true;\n        }\n\n        // --- تعاملات موس و تاچ ---\n        function handleStart(x, y) {\n            isDragging = true;\n            lastInput = { x: x, y: y };\n\n            if (mode === 'point') {\n                let v = getSpherePoint(x, y);\n                activePointPair = v;\n                pointPairs.push(activePointPair);\n            } \n            else if (mode === 'circle') {\n                // شرط هوشمند: اگر بیشتر از 3 دایره باشد ولی همگی از یک نقطه رد نشوند، متوقف کن\n                if (greatCircles.length >= 3 && !areCirclesCoaxial(greatCircles)) {\n                    alert('You have drawn three circles that form a triangle. Clear the canvas before drawing again.');\n                    isDragging = false;\n                    return;\n                }\n                circleStartVec = getSpherePoint(x, y);\n                activeCircleNormal = {x: 0, y: 0, z: 1};\n                greatCircles.push({ normal: activeCircleNormal });\n            }\n        }\n\n        function handleMove(x, y) {\n            if (!isDragging) return;\n\n            let deltaX = x - lastInput.x;\n            let deltaY = y - lastInput.y;\n\n            if (mode === 'orbit') {\n                rotY += deltaX * 0.01;\n                rotX -= deltaY * 0.01;\n                rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));\n            } \n            else if (mode === 'point' && activePointPair) {\n                let v = getSpherePoint(x, y);\n                activePointPair.x = v.x;\n                activePointPair.y = v.y;\n                activePointPair.z = v.z;\n            }\n            else if (mode === 'circle' && circleStartVec) {\n                let currentVec = getSpherePoint(x, y);\n                let normal = crossProduct(circleStartVec, currentVec);\n                \n                if (normal.x*normal.x + normal.y*normal.y + normal.z*normal.z > 0.0001) {\n                    let normNormal = normalize(normal);\n                    let circle = greatCircles[greatCircles.length - 1];\n                    circle.normal.x = normNormal.x;\n                    circle.normal.y = normNormal.y;\n                    circle.normal.z = normNormal.z;\n                }\n            }\n\n            lastInput = { x: x, y: y };\n        }\n\n        function handleEnd() {\n            isDragging = false;\n            activePointPair = null;\n            circleStartVec = null;\n        }\n\n        canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));\n        canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));\n        window.addEventListener('mouseup', handleEnd);\n\n        canvas.addEventListener('touchstart', (e) => {\n            e.preventDefault(); \n            if (e.touches.length > 0) handleStart(e.touches[0].clientX, e.touches[0].clientY);\n        }, { passive: false });\n\n        canvas.addEventListener('touchmove', (e) => {\n            e.preventDefault();\n            if (e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY);\n        }, { passive: false });\n\n        window.addEventListener('touchend', handleEnd);\n        window.addEventListener('touchcancel', handleEnd);\n\n        // --- پیدا کردن مثلثِ روبه‌رو ---\n        let lastTriId = \"\";\n        let lastRadius = -1;\n\n        function updateFacingTriangle() {\n            // جلوگیری از تشکیل و محاسبه مثلث تا زمان رها کردن کلیک موس در حالت رسم دایره\n            if (isDragging && mode === 'circle') {\n                facingTriangle = null;\n                document.getElementById('info-panel').style.display = 'none';\n                lastTriId = \"\";\n                return;\n            }\n\n            // اگر تعداد دایره‌ها دقیقاً 3 تا نبود (مثلث تشکیل نمی‌شود)، محاسبات پنل را مخفی کن\n            if (greatCircles.length !== 3) {\n                facingTriangle = null;\n                document.getElementById('info-panel').style.display = 'none';\n                lastTriId = \"\";\n                return;\n            }\n\n            // ⭐ اضافه شد: اگر 3 دایره رسم شده ولی همگی هم‌محور هستند، مثلثی تشکیل نمی‌شود!\n            if (areCirclesCoaxial(greatCircles)) {\n                facingTriangle = null;\n                document.getElementById('info-panel').style.display = 'none';\n                lastTriId = \"\";\n                return;\n            }\n\n            let N1 = greatCircles[0].normal;\n            let N2 = greatCircles[1].normal;\n            let N3 = greatCircles[2].normal;\n\n            let bestZ = -Infinity;\n            let bestTri = null;\n            \n            let signs = [1, -1];\n            for(let s1 of signs) {\n                for(let s2 of signs) {\n                    for(let s3 of signs) {\n                        let m1 = multiplyScalar(N1, s1);\n                        let m2 = multiplyScalar(N2, s2);\n                        let m3 = multiplyScalar(N3, s3);\n                        \n                        let cross23 = crossProduct(m2, m3);\n                        let D = dotProduct(m1, cross23);\n                        \n                        if (Math.abs(D) < 0.001) continue; \n                        \n                        let signD = Math.sign(D);\n                        let v1 = normalize(multiplyScalar(cross23, signD));\n                        let v2 = normalize(multiplyScalar(crossProduct(m3, m1), signD));\n                        let v3 = normalize(multiplyScalar(crossProduct(m1, m2), signD));\n                        \n                        let center = normalize({x: v1.x+v2.x+v3.x, y: v1.y+v2.y+v3.y, z: v1.z+v2.z+v3.z});\n                        let rotatedCenter = rotate3D(center.x, center.y, center.z, rotX, rotY);\n                        \n                        if (rotatedCenter.z > bestZ) {\n                            bestZ = rotatedCenter.z;\n                            \n                            let alpha = Math.PI - Math.acos(Math.max(-1, Math.min(1, dotProduct(m2, m3))));\n                            let beta  = Math.PI - Math.acos(Math.max(-1, Math.min(1, dotProduct(m1, m3))));\n                            let gamma = Math.PI - Math.acos(Math.max(-1, Math.min(1, dotProduct(m1, m2))));\n                            \n                            let id = `${s1},${s2},${s3}`;\n                            bestTri = { id, v1, v2, v3, alpha, beta, gamma };\n                        }\n                    }\n                }\n            }\n\n            if (bestTri) {\n                facingTriangle = bestTri;\n                \n                if (bestTri.id !== lastTriId || physicalRadius !== lastRadius) {\n                    let area = Math.pow(physicalRadius, 2) * (bestTri.alpha + bestTri.beta + bestTri.gamma - Math.PI);\n\n                    document.getElementById('val-alpha').innerText = (bestTri.alpha * 180 / Math.PI).toFixed(1) + \"°\";\n                    document.getElementById('val-beta').innerText = (bestTri.beta * 180 / Math.PI).toFixed(1) + \"°\";\n                    document.getElementById('val-gamma').innerText = (bestTri.gamma * 180 / Math.PI).toFixed(1) + \"°\";\n                    document.getElementById('val-area').innerText = Math.abs(area).toFixed(2);\n                    \n                    document.getElementById('info-panel').style.display = 'block';\n                    lastTriId = bestTri.id;\n                    lastRadius = physicalRadius;\n                }\n            } else {\n                facingTriangle = null;\n                document.getElementById('info-panel').style.display = 'none';\n                lastTriId = \"\";\n            }\n        }\n\n        // --- ترسیم ---\n        function drawSphereBase() {\n            ctx.beginPath();\n            ctx.arc(cx, cy, R, 0, Math.PI * 2);\n            let grad = ctx.createRadialGradient(cx - R*0.3, cy - R*0.3, R*0.1, cx, cy, R);\n            grad.addColorStop(0, 'rgba(59, 130, 246, 0.4)');\n            grad.addColorStop(1, 'rgba(30, 58, 138, 0.7)');\n            ctx.fillStyle = grad;\n            ctx.fill();\n            ctx.lineWidth = 1;\n            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';\n            ctx.stroke();\n\n            drawCircle({x: 0, y: 1, z: 0}, 'rgba(255,255,255,0.15)', false);\n            drawCircle({x: 1, y: 0, z: 0}, 'rgba(255,255,255,0.15)', false);\n        }\n\n        function drawCircle(normal, color, isHighlight = true) {\n            let u = {x: 0, y: 1, z: 0};\n            if (Math.abs(normal.y) > 0.9) u = {x: 1, y: 0, z: 0};\n            let v1 = normalize(crossProduct(normal, u));\n            let v2 = normalize(crossProduct(normal, v1));\n\n            let segments = 100;\n            let points = [];\n\n            for (let i = 0; i <= segments; i++) {\n                let angle = (i / segments) * Math.PI * 2;\n                let px = v1.x * Math.cos(angle) + v2.x * Math.sin(angle);\n                let py = v1.y * Math.cos(angle) + v2.y * Math.sin(angle);\n                let pz = v1.z * Math.cos(angle) + v2.z * Math.sin(angle);\n                let pRot = rotate3D(px, py, pz, rotX, rotY);\n                points.push({ x: cx + pRot.x * R, y: cy + pRot.y * R, z: pRot.z });\n            }\n\n            ctx.beginPath();\n            for (let i = 0; i < segments; i++) {\n                if ((points[i].z + points[i+1].z) / 2 < 0) {\n                    ctx.moveTo(points[i].x, points[i].y);\n                    ctx.lineTo(points[i+1].x, points[i+1].y);\n                }\n            }\n            ctx.strokeStyle = color.replace(/[\\d\\.]+\\)$/g, '0.2)');\n            ctx.lineWidth = isHighlight ? 2 : 1;\n            ctx.setLineDash([5, 5]);\n            ctx.stroke();\n\n            ctx.beginPath();\n            for (let i = 0; i < segments; i++) {\n                if ((points[i].z + points[i+1].z) / 2 >= 0) {\n                    ctx.moveTo(points[i].x, points[i].y);\n                    ctx.lineTo(points[i+1].x, points[i+1].y);\n                }\n            }\n            ctx.strokeStyle = color;\n            ctx.lineWidth = isHighlight ? 3 : 1;\n            ctx.setLineDash([]);\n            ctx.stroke();\n        }\n\n        function drawActiveTriangleEdges(tri) {\n            const drawEdge = (vA, vB) => {\n                let dot = Math.max(-1, Math.min(1, dotProduct(vA, vB)));\n                let angle = Math.acos(dot);\n                let sinTheta = Math.sin(angle);\n                if (sinTheta < 0.001) return; \n\n                let segments = 40;\n                ctx.beginPath();\n                let isDrawing = false;\n                \n                for (let i = 0; i <= segments; i++) {\n                    let t = i / segments;\n                    let a = Math.sin((1 - t) * angle) / sinTheta;\n                    let b = Math.sin(t * angle) / sinTheta;\n                    let p = {\n                        x: vA.x * a + vB.x * b,\n                        y: vA.y * a + vB.y * b,\n                        z: vA.z * a + vB.z * b\n                    };\n                    \n                    let pRot = rotate3D(p.x, p.y, p.z, rotX, rotY);\n                    if (pRot.z >= -0.05) { \n                        let screenX = cx + pRot.x * R;\n                        let screenY = cy + pRot.y * R;\n                        if (!isDrawing) {\n                            ctx.moveTo(screenX, screenY);\n                            isDrawing = true;\n                        } else {\n                            ctx.lineTo(screenX, screenY);\n                        }\n                    } else {\n                        isDrawing = false;\n                    }\n                }\n                ctx.shadowBlur = 10;\n                ctx.shadowColor = '#10b981';\n                ctx.strokeStyle = '#34d399'; \n                ctx.lineWidth = 4;\n                ctx.stroke();\n                ctx.shadowBlur = 0;\n            };\n\n            drawEdge(tri.v1, tri.v2);\n            drawEdge(tri.v2, tri.v3);\n            drawEdge(tri.v3, tri.v1);\n        }\n\n        function drawTriangleLabels() {\n            if (!facingTriangle) return;\n\n            const drawText = (v, text) => {\n                let p = rotate3D(v.x, v.y, v.z, rotX, rotY);\n                if (p.z >= -0.1) {\n                    let sx = cx + p.x * R;\n                    let sy = cy + p.y * R;\n                    \n                    ctx.beginPath();\n                    ctx.arc(sx, sy, 6, 0, Math.PI*2);\n                    ctx.fillStyle = '#10b981';\n                    ctx.fill();\n                    ctx.strokeStyle = '#fff';\n                    ctx.lineWidth = 2;\n                    ctx.stroke();\n\n                    ctx.fillStyle = '#fff';\n                    ctx.font = 'bold 22px Times New Roman';\n                    ctx.fillText(text, sx + 12, sy - 12);\n                }\n            };\n\n            drawText(facingTriangle.v1, 'α');\n            drawText(facingTriangle.v2, 'β');\n            drawText(facingTriangle.v3, 'γ');\n        }\n\n        function drawPointPair(p) {\n            let p1 = rotate3D(p.x, p.y, p.z, rotX, rotY);\n            let p2 = rotate3D(-p.x, -p.y, -p.z, rotX, rotY);\n\n            const drawP = (proj, colorFront, colorBack) => {\n                let sx = cx + proj.x * R;\n                let sy = cy + proj.y * R;\n                ctx.beginPath();\n                if (proj.z >= 0) {\n                    ctx.arc(sx, sy, 7, 0, Math.PI*2);\n                    ctx.fillStyle = colorFront;\n                } else {\n                    ctx.arc(sx, sy, 4, 0, Math.PI*2);\n                    ctx.fillStyle = colorBack;\n                }\n                ctx.fill();\n                ctx.strokeStyle = '#fff';\n                ctx.lineWidth = 1;\n                ctx.stroke();\n            };\n\n            drawP(p1, '#ef4444', 'rgba(239, 68, 68, 0.3)');\n            drawP(p2, '#f59e0b', 'rgba(245, 158, 11, 0.3)');\n        }\n\n        function render() {\n            ctx.clearRect(0, 0, width, height);\n            drawSphereBase();\n\n            greatCircles.forEach(circle => {\n                drawCircle(circle.normal, 'rgba(250, 204, 21, 0.9)');\n            });\n\n            pointPairs.forEach(pair => {\n                drawPointPair(pair);\n            });\n\n            updateFacingTriangle(); \n            if (facingTriangle) {\n                drawActiveTriangleEdges(facingTriangle); \n                drawTriangleLabels(); \n            }\n\n            requestAnimationFrame(render);\n        }\n\n        render();\n    <\/script>\n\n<script>\n(function () {\n    function setupMobileSheet(selector) {\n        const panel = document.querySelector(selector);\n        if (!panel || panel.dataset.mobileSheetReady === '1') return;\n        panel.dataset.mobileSheetReady = '1';\n\n        const grip = document.createElement('div');\n        grip.className = 'sheet-grip';\n        grip.setAttribute('aria-hidden', 'true');\n        panel.prepend(grip);\n\n        let startY = 0;\n        let lastY = 0;\n        let dragging = false;\n\n        function isMobile() {\n            return window.matchMedia('(max-width: 820px)').matches;\n        }\n        function setCollapsed(value) {\n            if (!isMobile()) return;\n            document.body.classList.toggle('sheet-collapsed', value);\n        }\n\n        grip.addEventListener('pointerdown', (event) => {\n            if (!isMobile()) return;\n            dragging = true;\n            startY = event.clientY;\n            lastY = event.clientY;\n            grip.setPointerCapture?.(event.pointerId);\n            event.preventDefault();\n        });\n\n        grip.addEventListener('pointermove', (event) => {\n            if (!dragging) return;\n            lastY = event.clientY;\n            event.preventDefault();\n        });\n\n        function finish() {\n            if (!dragging) return;\n            const delta = lastY - startY;\n            if (delta > 24) setCollapsed(true);\n            if (delta < -24) setCollapsed(false);\n            dragging = false;\n        }\n\n        grip.addEventListener('pointerup', finish);\n        grip.addEventListener('pointercancel', finish);\n        grip.addEventListener('click', () => {\n            if (!isMobile()) return;\n            document.body.classList.toggle('sheet-collapsed');\n        });\n    }\n\n    setupMobileSheet('.controls');\n    setupMobileSheet('#ui-container');\n})();\n<\/script>\n\n</body>\n</html>\n", "mandala": "<!DOCTYPE html>\n<html lang=\"en\" dir=\"ltr\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>Hyperbolic Art: Interactive Mobius Transformation</title>\n    <style>\n        body {\n            font-family: Tahoma, Arial, sans-serif;\n            background-color: #0f0f13;\n            color: #eee;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            margin: 0;\n            padding: 20px;\n        }\n        .container {\n            background: #1a1a24;\n            padding: 20px;\n            border-radius: 15px;\n            box-shadow: 0 10px 30px rgba(0,0,0,0.8);\n            text-align: center;\n            max-width: 900px;\n            width: 100%;\n        }\n        canvas {\n            background-color: #050508;\n            border: 2px solid #333;\n            border-radius: 50%;\n            margin-top: 15px;\n            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);\n            cursor: crosshair;\n        }\n        .instructions {\n            font-size: 1em;\n            color: #aaa;\n            line-height: 1.8;\n            margin-bottom: 10px;\n        }\n        .highlight {\n            color: #00ffff;\n            font-weight: bold;\n        }\n        \n        /* استایل‌های مربوط به فرمول ریاضی آفلاین */\n        .math-formula {\n            display: inline-flex;\n            align-items: center;\n            font-family: \"Times New Roman\", Times, serif;\n            font-size: 1.2em;\n            color: #fff;\n            direction: ltr; /* فرمول‌ها باید چپ‌به‌راست باشند */\n            margin: 0 5px;\n            vertical-align: middle;\n        }\n        .math-fraction {\n            display: inline-flex;\n            flex-direction: column;\n            align-items: center;\n            margin: 0 5px;\n        }\n        .math-num {\n            padding: 0 5px;\n            border-bottom: 1px solid #fff; /* خط کسر */\n            line-height: 1.2;\n        }\n        .math-den {\n            padding: 0 5px;\n            line-height: 1.2;\n        }\n        .math-italic {\n            font-style: italic;\n        }\n            body { direction: ltr; }\n\n    \n        /* mobile-layout-fix-v2-mandala */\n        @media (max-width: 820px) {\n            html, body {\n                width: 100%;\n                min-height: 100%;\n                overflow: auto !important;\n            }\n            body {\n                display: block !important;\n                padding: 8px !important;\n            }\n            .container {\n                width: 100% !important;\n                max-width: 100% !important;\n                padding: 12px !important;\n                border-radius: 10px !important;\n            }\n            h2 {\n                font-size: 1rem !important;\n                line-height: 1.35;\n                margin: 0 0 8px !important;\n            }\n            .instructions {\n                fon how straight lines bend while their intersection angles always remain fixed!\n    </div>\n\n    <canvas id=\"artCanvas\" width=\"700\" height=\"700\"></canvas>\n</div>\n\n<script>\n    const canvas = document.getElementById('artCanvas');\n    const ctx = canvas.getContext('2d');\n    \n    const width = canvas.width;\n    const height = canvas.height;\n    const centerX = width / 2;\n    const centerY = height / 2;\n    const R = 340;\n\n    let basePaths = [];\n\n    // شبکه‌های شعاعی\n    for (let theta = 0; theta < Math.PI * 2; theta += Math.PI / 12) {\n        let path = [];\n        for (let r = 0; r <= 0.99; r += 0.02) {\n            path.push({x: r * Math.cos(theta), y: r * Math.sin(theta)});\n        }\n        basePaths.push({points: path, color: 'rgba(0, 255, 255, 0.5)', width: 1});\n    }\n\n    // دایره‌های متحدالمرکز\n    for (let r = 0.15; r < 1; r += 0.15) {\n        let path = [];\n        for (let theta = 0; theta <= Math.PI * 2.05; theta += 0.05) {\n            path.push({x: r * Math.cos(theta), y: r * Math.sin(theta)});\n        }\n        let hue = Math.floor((r * 360));\n        basePaths.push({points: path, color: `hsla(${hue}, 100%, 60%, 0.7)`, width: 2});\n    }\n\n    // گل هندسی در مرکز\n    let rosePath = [];\n    for (let theta = 0; theta <= Math.PI * 2.01; theta += 0.01) {\n        let r = 0.75 * Math.abs(Math.sin(3 * theta)); \n        rosePath.push({x: r * Math.cos(theta), y: r * Math.sin(theta)});\n    }\n    basePaths.push({points: rosePath, color: '#ff00ff', width: 3});\n\n    // تابع تبدیل موبیوس\n    function mobiusTransform(x, y, bx, by) {\n        let Nx = x + bx;\n        let Ny = y + by;\n\n        let Dx = 1 + (bx * x + by * y);\n        let Dy = (bx * y - by * x);\n\n        let D_sq = Dx * Dx + Dy * Dy;\n        \n        let wx = (Nx * Dx + Ny * Dy) / D_sq;\n        let wy = (Ny * Dx - Nx * Dy) / D_sq;\n\n        return {x: wx, y: wy};\n    }\n\n    // تابع رسم کل صفحه\n    function draw(bx, by) {\n        ctx.clearRect(0,                font-size: 1.36rem !important;\n                line-height: 1.35;\n                margin-bottom: 10px;\n            }\n            h2 {\n                font-size: 1.08rem;\n                line-height: 1.45;\n                margin-top: 30px;\n                padding-bottom: 7px;\n            }\n            h3 {\n                font-size: 0.98rem;\n                line-height: 1.45;\n            }\n            p, ul, ol {\n                font-size: 0.98rem !important;\n            }\n            p {\n                text-align: start;\n            }\n            .abstract,\n            .svg-container {\n                padding: 14px !important;\n                border-radius: 8px !important;\n            }\n            .legend {\n                justify-content: flex-start !important;\n                gap: 10px !important;\n            }\n            .math-box {\n                font-size: 0.98rem !important;\n                justify-content: flex-start !important;\n                overflow-x: auto;\n                flex-wrap: nowrap;\n                padding-bottom: 4px;\n            }\n            svg {\n                max-width: 100%;\n                height: auto;\n            }\n            .references {\n                padding-inline-start: 22px !important;\n                overflow-wrap: anywhere;\n            }\n        }\n\n\n        /* mobile-doc-edge-safe-v13 */\n        @media (max-width: 820px) {\n            html,\n            body {\n                width: 100%;\n                max-width: 100%;\n                overflow-x: hidden !important;\n            }\n            *,\n            *::before,\n            *::after {\n                box-sizing: border-box;\n            }\n        }\n\n</style>\n</head>\n<body>\n\n<div class=\"container\">\n    <h1>رهایی از زندان اقلیدسی ذهن</h1>\n    <h3 style=\"text-align: center; margin-top: 0; color: #555;\">وارونگی تاریخی جبر و هندسه در درک فضاهای نااقلیدسی</h3>\n    <p style=\"text-align: center; margin-bottom: 40px;\"><em>پیش‌نویسی در باب معرفت‌شناسی ساختارگرا و فلسفه‌ی ریاضیات</em></p>\n\n    <div class=\"abstract\">\n        <strong>چکیده:</strong><br>\n        این مقاله به بررسی تعامل عمیق میان ساختارهای انتزاعی جبری و درک شهودی هندسی می‌پردازد. با تمرکز بر محدودیت‌های شناختی انسان که ریشه در تکامل بیولوژیک و درک پیشینی اقلیدسی دارد (همان‌گونه که ایمانوئل کانت مطرح کرد)، نشان می‌دهیم که چگونه ریاضیات مدرن از طریق ابزارهای جبری (به‌ویژه نظریه گروه‌ها و اعداد مختلط) توانسته است این فشار پیشینی را در هم بشکند. مقاله با بررسی دقیق یک گروه غیرآبلی روی مجموعه <span class=\"math-inline\">Z × Z</span> آغاز می‌شود، سپس به سراغ مدل دیسک پوانکاره در هندسه هذلولوی می‌رود و با اثبات هم‌ارزی ترکیب توابع موبیوس و ضرب ماتریس‌ها، نشان می‌دهد که چگونه یک ساختار غیرآبلی می‌تواند ماهیت انحنای فضا را توصیف کند.\n    </div>\n\n    <h2>۱. مقدمه: تقابل شهود و انتزاع</h2>\n    <p>\n        ایمانوئل کانت در نقد عقل محض استدلال کرد که «فضا» و «زمان»، مفاهیمی تجربی نیستند، بلکه قالب های پیشینی» (A priori) ذهن ما هستند. از دیدگاه کانت ذهن انسان دارای یک فیلتر شناختی است که جهان را مطلقاً بر اساس هندسه اقلیدسی پردازش میکند. ما از نظر بیولوژیکی و تکاملی در محیط های محلی و نسبتا «تخت» زیسته ایم و به همین دلیل تخیل فضایی غیر از فضای سه بعدی اقلیدسی برای ما غیر ممکن است.\nبا این حال پیشرفت ریاضیات نشان داد که اگرچه شهود ما در قفس اقلیدسی گرفتار است، اما «منطق» و «جبر» راه فراری برای ما فراهم میکنند. ریاضیات با خلق ساختارهای انتزاعی که نیازی به تصویرسازی ذهنی ندارند، به یک اسکلت بیرونی (Exoskeleton) برای عقل انسان تبدیل شد. برای درک این سازوکار، ابتدا باید به بنیادی ترین زبان انتزاع در ریاضیات، یعنی نظریه «گروه ها»، بپردازیم.\n    </p>\n\n    <h2>۲. پایه‌های ساختارگرایی: نظریه گروه‌ها و خلق واقعیت‌های موازی</h2>\n    <p>\n        برای درک اینکه چگونه می‌توان قوانین یک فضا را تغییر داد، ابتدا باید مفهوم گروه را تعریف کنیم. یک گروه <span class=\"math-inline\">(G, ∘)</span> شامل یک مجموعه مانند <span class=\"math-inline\">G</span> و یک عملگر دوتایی مانند <span class=\"math-inline\">∘</span> است که چهار شرط زیر را ارضا کند: بسته بودن، شرکت‌پذیری، وجود عضو خنثی <span class=\"math-inline\">(e)</span> و وجود عضو معکوس <span class=\"math-inline\">(a<sup>-1</sup>)</span>. اگر شرط جابجایی‌پذیری <span class=\"math-inline\">(a ∘ b = b ∘ a)</span> نیز برقرار باشد، گروه را <strong>آبلی</strong> می‌نامند.\n    </p>\n    \n    <h3>مثال: دو جهان متفاوت روی یک مجموعه واحد</h3>\n    <p>\n        فرض کنید مجموعه ما، جفت‌مرتب‌هایی از اعداد صحیح باشد: <span class=\"math-inline\">S = Z × Z</span>.\n    </p>\n    <p>\n        <strong>جهان اول (گروه آبلی):</strong> اگر عملگر <span class=\"math-inline\">+</span> را جمع برداری معمولی تعریف کنیم:\n    </p>\n    <div class=\"math-box\">\n        (a, b) + (c, d) = (a + c, b + d)\n    </div>\n    <p>\n        این فضا کاملاً شهودی، تخت و جابجایی‌پذیر (آبلی) است.\n    </p>\n    <p>\n        <strong>جهان دوم (گروه غیرآبلی):</strong> حال روی همان مجموعه <span class=\"math-inline\">S</span>، عملگر جدید <span class=\"math-inline\">∘</span> را به این شکل تعریف می‌کنیم:\n    </p>\n    <div class=\"math-box\">\n        (a, b) ∘ (c, d) = (a + (-1)^b × c , b + d)\n    </div>\n    <p>\n        آیا این دو جهان یکسان هستند؟ خیر. جهان دوم غیرآبلی است. اگر دو عضو (1, 1) و (1, 0) را انتخاب کنیم:\n    </p>\n    <div class=\"math-box\" style=\"flex-direction: column; gap: 5px;\">\n        <div>(1, 1) ∘ (1, 0) = (1 + (-1)<sup>1</sup> × 1, 1 + 0) = (1 - 1, 1) = (0, 1)</div>\n        <div>(1, 0) ∘ (1, 1) = (1 + (-1)<sup>0</sup> × 1, 0 + 1) = (1 + 1, 1) = (2, 1)</div>\n    </div>\n    <p>\n        از آنجا که <span class=\"math-inline\">(0, 1) ≠ (2, 1)</span>، این گروه غیرجابجایی‌پذیر است. درک عضو معکوس در این جهان جدید نیز نیازمند محاسبه انتزاعی است:\n    </p>\n    <div class=\"math-box\">\n        (a, b)^-1= (-(-1)^b × a , -b)\n    </div>\n    <p>\n        این مثال ساده نشان می‌دهد که ذهن انسان قادر است با تغییر منطق ترکیب عناصر، ساختارهایی بسازد که در ظاهر یکسان‌اند، اما در باطن رفتار کاملاً متفاوتی دارند.\n    </p>\n\n    <h2>۳. دیالکتیک تاریخی: هندسه و جبر به عنوان ناجی یکدیگر</h2>\n    <p>\n        <strong>فاز اول: هندسه، هیولای اعداد موهومی را اهلی می‌کند.</strong> هنگامی که معادله‌ای چون <span class=\"math-inline\">x<sup>2</sup> + 1 = 0</span> مطرح شد، عدد موهومی <span class=\"math-inline\">i = √-1</span> متولد شد. این عدد یک دهن کجی به بدیهیات فیزیکی بود چگونه مساحت یک مربع میتواند منفی باشد؟ لایینیتس آن را موجودی میان هستی و نیستی نامید و ذهن جبراندیش قادر به هضم آن نبود. اما «هندسه» به داد جبر رسید. با معرفی صفحه مختلط توسط وسل آرگاند و گاوس ضرب در i از یک مفهوم مبهم به یک دوران ۹۰ درجه در صفحه تعبیر شد. هندسه اعداد موهومی را قابل رویت و تفکرپذیر کرد.\n    </p>\n    <p>\n        <strong>فاز دوم: جبر، هندسه نااقلیدسی را از بن‌بست خارج می‌کند.</strong> در قرن نوزدهم کشف هندسه های نا اقلیدسی توسط لباچفسکی و ریمان یک بحران شناختی ایجاد کرد. در هندسه هذلولوی از یک نقطه خارج از یک خط می توان بی نهایت خط موازی رسم کرد که هرگز خط اول را قطع نکنند. این امر برای فیلتر اقلیدسی ذهن انسان غیر قابل تصور است. اینجا بود که یک «وارونگی تاریخی» رخ داد. این بار جبر و اعداد موهومی به داد هندسه رسیدند. برای درک این فضای غیر قابل تصور ریاضیدانان (مانند پوانکاره) مدل هایی ریاضی بر پایه اعداد مختلط C بنا کردند.\n    </p>\n    <p>\n\n\n\n\n    </p>\n\n    <h2>۴. مدل دیسک پوانکاره و تجسم هندسه هذلولوی</h2>\n    <p>\n        در مدل دیسک پوانکاره، کل جهان ما به درون یک دایره واحد در صفحه اعداد مختلط محدود می‌شود:\n    </p>\n    <div class=\"math-box\">\n        D = { z ∈ C : |z| < 1 }\n    </div>\n    <p>\n        در این جهان خطوط مستقیم (ژئودزیک ها) دیگر خطوط صاف اقلیدسی نیستند، بلکه کمان هایی از دایره ها هستند که بر مرز دیسک عمودند یا قطرهایی که از مرکز می گذرند. اگر خطی مانند L و نقطه ای مانند P خارج از آن داشته باشیم، می توانیم بی نهایت کمان خط هذلولوی رسم کنیم که از P میگذرند ولی هرگز با L در درون دیسک برخورد نمی کنند. (در تابع تبدیل موبیوس خطوطی که از مرکز دایره واحد بگذرند دقیقاً مشابه قطر های دایره دیده می شوند)\n\nبراساس برنامه ارلانگن فلیکس کلاین هندسه صرفاً مطالعه ی نقطه ها نیست، بلکه مطالعه ی گروه تقارن ها است. گروه انتقال ها در فضای تخت اقلیدسی یک گروه آبلی (مانند ( + , R ) است؛ یعنی مهم نیست ابتدا به شرق بروید و بعد به شمال یا برعکس. \n    </p>\n\n    <div class=\"svg-container\">\n        <svg width=\"500\" height=\"500\" viewBox=\"0 0 500 500\">\n            <circle cx=\"250\" cy=\"250\" r=\"200\" fill=\"#f0f8ff\" stroke=\"#333\" stroke-width=\"3\"/>\n            <path d=\"M 108.6 391.4 A 200 200 0 0 1 391.4 391.4\" fill=\"transparent\" stroke=\"red\" stroke-width=\"4\"/>\n            <text x=\"250\" y=\"360\" fill=\"red\" font-size=\"20\" font-weight=\"bold\">L</text>\n            <circle cx=\"108.6\" cy=\"391.4\" r=\"5\" fill=\"darkred\"/>\n            <text x=\"85\" y=\"415\" fill=\"darkred\" font-size=\"16\">A</text>\n            <circle cx=\"391.4\" cy=\"391.4\" r=\"5\" fill=\"darkred\"/>\n            <text x=\"400\" y=\"415\" fill=\"darkred\" font-size=\"16\">B</text>\n            <circle cx=\"250\" cy=\"250\" r=\"5\" fill=\"black\"/>\n            <text x=\"235\" y=\"240\" font-size=\"22\" font-weight=\"bold\">P</text>\n            <line x1=\"391.4\" y1=\"108.6\" x2=\"108.6\" y2=\"391.4\" stroke=\"blue\" stroke-width=\"2\" stroke-dasharray=\"6,6\"/>\n            <line x1=\"108.6\" y1=\"108.6\" x2=\"391.4\" y2=\"391.4\" stroke=\"blue\" stroke-width=\"2\" stroke-dasharray=\"6,6\"/>\n            <line x1=\"50\" y1=\"250\" x2=\"450\" y2=\"250\" stroke=\"#27ae60\" stroke-width=\"2\"/>\n            <line x1=\"108.6\" y1=\"250\" x2=\"391.4\" y2=\"250\" stroke=\"#27ae60\" stroke-width=\"2\" transform=\"rotate(20 250 250)\"/>\n            <line x1=\"108.6\" y1=\"250\" x2=\"391.4\" y2=\"250\" stroke=\"#27ae60\" stroke-width=\"2\" transform=\"rotate(-20 250 250)\"/>\n            <line x1=\"250\" y1=\"50\" x2=\"250\" y2=\"450\" stroke=\"gray\" stroke-width=\"1.5\" stroke-dasharray=\"4,4\"/>\n        </svg>\n\n        <div class=\"legend\">\n            <div><div class=\"color-box\" style=\"border: 1px solid #333; border-radius: 50%;\"></div> مرز کیهان  (بی‌نهایت) (خطوط سیاه)</div>\n            <div><div class=\"color-box\" style=\"background-color: red;\"></div> (قرمز) خط مفروض L</div>\n            <div><div class=\"color-box\" style=\"background-color: blue;\"></div> (آبی) موازی‌های مجانبی</div>\n            <div><div class=\"color-box\" style=\"background-color: #27ae60;\"></div> فرا-موازی‌ها  (بی‌نهایت) (سبز)</div>\n            <div><div class=\"color-box\" style=\"background-color: darkred; border-radius: 50%;\"></div> نقاط ایده‌آل (A, B)</div>\n        </div>\n        <p style=\"font-size: 0.9em; color: #666; margin-top: 15px;\">\n            <strong>تجسم هندسی:</strong> از نقطه P می‌توان <em>بی‌نهایت</em> خط سبز رنگ رسم کرد که همگی با خط قرمز L در درون دیسک موازیند (هرگز آن را قطع نمی‌کنند). خطوط نقطه‌چین آبی نشان‌دهنده موازی‌های مجانبی هستند که تنها در بی‌نهایت (نقاط A و B) به L می‌رسند. این اثبات بصری نقض اصل پنجم اقلیدس است.\n        </p>\n    </div>\n\n    <h2>۵. گروه تقارن‌های هذلولوی: اثبات پیوند ترکیب توابع و ضرب ماتریس‌ها</h2>\n    <p>\n        بر اساس <em>برنامه ارلانگن</em> فلیکس کلاین، هندسه هذلولوی توسط یک گروه غیرآبلی از تبدیلات موبیوس کنترل می‌شود:\n    </p>\n\n    <div class=\"math-box\">\n        <span class=\"math-inline\">f(z) = </span>\n        <div class=\"frac\">\n            <span class=\"top\">az + b</span>\n            <span>b̄z + ā</span>\n        </div>\n    </div>\n\n    <p>\n        با شرط <span class=\"math-inline\">|a|² - |b|² = 1</span>. برای اثبات اینکه این گروه با ماتریس‌های گروه ویژه یکانی SU(1,1) هم‌ارز است، ثابت می‌کنیم که ترکیب دو تابع <span class=\"math-inline\">f₁ ∘ f₂</span> دقیقاً معادل ضرب دو ماتریس متناظر آن‌هاست.\n    </p>\n    <p>\n        فرض کنید دو ماتریس <span class=\"math-inline\">M₁</span> و <span class=\"math-inline\">M₂</span> داریم:\n    </p>\n\n    <div class=\"math-box\">\n        M₁ = \n        <table class=\"matrix\">\n            <tr><td>a₁</td><td>b₁</td></tr>\n            <tr><td>b̄₁</td><td>ā₁</td></tr>\n        </table>\n        ,  M₂ = \n        <table class=\"matrix\">\n            <tr><td>a₂</td><td>b₂</td></tr>\n            <tr><td>b̄₂</td><td>ā₂</td></tr>\n        </table>\n    </div>\n\n    <p>\n        تابع ترکیبی <span class=\"math-inline\">f₁(f₂(z))</span> به شکل زیر محاسبه می‌شود (جایگذاری کسر در کسر):\n    </p>\n\n    <div class=\"math-box\">\n        f₁(f₂(z)) = \n        <div class=\"frac\" style=\"min-width:200px;\">\n            <span class=\"top\" style=\"padding-bottom: 8px;\">\n                a₁\n                <div class=\"frac\" style=\"font-size: 0.85em; min-width:120px;\"><span class=\"top\">a₂ z + b₂</span><span>b̄₂ z + ā₂</span></div>\n                + b₁\n            </span>\n            <span style=\"padding-top: 8px;\">\n                b̄₁\n                <div class=\"frac\" style=\"font-size: 0.85em; min-width:120px;\"><span class=\"top\">a₂ z + b₂</span><span>b̄₂ z + ā₂</span></div>\n                + ā₁\n            </span>\n        </div>\n    </div>\n\n    <p>\n        با ضرب صورت و مخرج در عبارت <span class=\"math-inline\">(b̄₂ z + ā₂)</span> و فاکتورگیری از <span class=\"math-inline\">z</span> کسر ساده می‌شود:\n    </p>\n\n    <div class=\"math-box\">\n        f₁(f₂(z)) = \n        <div class=\"frac\" style=\"min-width:200px;\">\n            <span class=\"top\">(a₁ a₂ + b₁ b̄₂) z + (a₁ b₂ + b₁ ā₂)</span>\n            <span>(b̄₁ a₂ + ā₁ b̄₂) z + (b̄₁ b₂ + ā₁ ā₂)</span>\n        </div>\n    </div>\n\n    <p>\n        اکنون ضرب ماتریسی <span class=\"math-inline\">M₁ × M₂</span> را انجام می‌دهیم:\n    </p>\n\n    <div class=\"math-box\" style=\"font-size: 1.1em;\">\n        M₁ × M₂ = \n        <table class=\"matrix\">\n            <tr><td>a₁</td><td>b₁</td></tr>\n            <tr><td>b̄₁</td><td>ā₁</td></tr>\n        </table>\n        ×\n        <table class=\"matrix\">\n            <tr><td>a₂</td><td>b₂</td></tr>\n            <tr><td>b̄₂</td><td>ā₂</td></tr>\n        </table>\n        =\n        <table class=\"matrix\">\n            <tr>\n                <td>a₁ a₂ + b₁ b̄₂</td>\n                <td>a₁ b₂ + b₁ ā₂</td>\n            </tr>\n            <tr>\n                <td>b̄₁ a₂ + ā₁ b̄₂</td>\n                <td>b̄₁ b₂ + ā₁ ā₂</td>\n            </tr>\n        </table>\n    </div>\n\n    <p>\n        با تطبیق ضرایب ماتریس حاصل با تابع ساده شده، می‌بینیم که دقیقاً بر هم منطبق هستند. از آنجا که ضرب این ماتریس‌ها خاصیت جابجایی ندارد (<span class=\"math-inline\">M₁ M₂ ≠ M₂ M₁</span>)، گروه تبدیلات موبیوس فضای هذلولوی نیز غیر آبلی است. این عدم جابجایی پذیری در فیزیک و هندسه به معنای وجود\n«انحنا» در فضا است.\n    </p>\n    <h2>۶. سنتز فلسفی: شکستن فشار پیشینی با ابزار ساختارگرایی</h2>\n    <p>\n        همانطور که دیدیم، شهود انسان ذاتاً اقلیدسی است و حتی زمانی که سعی می‌کند فضای هذلولوی را در دیسک پوانکاره نمایش دهد، آن را به زور درون یک دایره‌ی اقلیدسی روی کاغذ یا مانیتور می‌چپاند. از این نظر، کانت حق داشت که فیلتر شناختی ما تغییرناپذیر به نظر می‌رسد.\n    </p>\n    <p>\n        اما نقد بنیادین به کانت (با تکیه بر سنت تجربه‌گرایی دیوید هیوم و قدرت ریاضیات) این است که کانت فراموش کرده بود استقرا و تکامل، عینک‌های پیشینی ما را برای بقا در یک محیط خاص ساخته‌اند، نه برای درک کل کیهان.\n    </p>\n    <p>\n        ما توانسته‌ایم با استفاده از «جبر» و «نظریه گروه‌ها»، از داخل این فیلتر شناختی مطلقا اقلیدسی فرار کنیم. وقتی نمی‌توانیم فضای خمیده را \n        <span class=\"math-inline\">تجسم</span>کنیم، آن را به قالب اعداد مختلط \n        <span class=\"math-inline\"></span> و ماتریس‌های غیرآبلی می‌بریم و آن را \n        <span class=\"math-inline\">محاسبه</span> می‌کنیم.\n    </p>\n    <p>\n        یگانه بودنِ ساختار \n        <span class=\"math-inline\">( R, + )</span> \n        به عنوان تنها گروه لیِ یک‌بعدیِ متصل، نشان می‌دهد که ذهن ما به دلیل تجربه خطی از فضا و زمان، این ساختار ساده و آبلی را به عنوان پیش‌فرض جهان پذیرفته است. اما کیهان الزامی به پیروی از مدل‌های ذهنی ما ندارد. ریاضیات، با معرفی ساختارهای پیچیده‌تر، به ما نشان داد که حقایق منطقی و ساختاریِ کیهان، فراتر از کنوانسیون‌های تجربی و توافقات بین‌الاذهانی بشر است.\n    </p>\n\n    <h2>نتیجه‌گیری</h2>\n    <p>\n        ریاضیات صرفاً ابزاری برای اندازه‌گیری نیست، بلکه مکانیزم رهایی‌بخش عقل انسان است. وقتی شهود هندسی ما در مواجهه با فضاهای نااقلیدسی به بن‌بست رسید، این جبر، گروه‌های غیرآبلی و اعداد موهومی بودند که هندسه را نجات دادند. یگانه بودن ساختار <span class=\"math-inline\">(R, +)</span> به عنوان تنها گروه متصل یک‌بعدی نشان می‌دهد ذهن ما این ساختار ساده و آبلی را پیش‌فرض جهان می‌داند، اما کیهان الزامی به پیروی از مدل‌های محدود ذهنی ما ندارد. این روند، شکوهمندترین دستاورد معرفت‌شناختی بشر است: شکستن فشار پیشینی ذهن، به کمک فرمالیسم ساختارگرایانه.\n    </p>\n\n\n    <h2>منابع</h2>\n    <ol class=\"references\" dir=\"rtl\">\n        <li>اندرسون، ج. و. (2005). <em>هندسه هذلولوی</em>، ویراست دوم. اشپرینگر.</li>\n        <li>آرتین، م. (1991). <em>جبر</em>. پرنتیس هال.</li>\n        <li>کاکستر، ه. س. م. (1998). <em>هندسه نااقلیدسی</em>، ویراست ششم. انجمن ریاضی آمریکا.</li>\n        <li>کانت، ا. (1998). <em>نقد عقل محض</em>، ترجمه پ. گایر و آ. و. وود. انتشارات دانشگاه کمبریج. اثر اصلی منتشرشده در 1781/1787.</li>\n        <li>کلاین، ف. (1893). مروری تطبیقی بر پژوهش‌های اخیر در هندسه. <em>بولتن انجمن ریاضی نیویورک، 2</em>، 215-249.</li>\n        <li>نیدهام، ت. (1997). <em>تحلیل مختلط بصری</em>. انتشارات دانشگاه آکسفورد.</li>\n        <li>ریمان، ب. (2016). <em>درباره فرضیه‌هایی که بنیادهای هندسه بر آنها قرار دارد</em>، ترجمه و. ک. کلیفورد. در ج. استیل‌ول (ویراستار)، <em>منابع هندسه هذلولوی</em>. انجمن ریاضی آمریکا. سخنرانی اصلی ارائه‌شده در 1854.</li>\n        <li>استیل‌ول، ج. (1996). <em>منابع هندسه هذلولوی</em>. انجمن ریاضی آمریکا.</li>\n    </ol>\n    <p class=\"author-credit\" dir=\"rtl\"><strong>نویسنده:</strong> محمد حسین براتی</p>\n\n\n</div>\n\n</body>\n</html>", "popper": "<!DOCTYPE html>\n<html lang=\"fa\" dir=\"rtl\">\n<head>\n    <meta charset=\"UTF-8\" />\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />\n    <title>پارادوکس انضمام و نابسندگی ملاک تحدید مستقل از نظریه معنا</title>\n    \n    <style>\n        /* متغیرهای رنگی و ا    direction: ltr;\n            display: inline-block;\n            font-style: italic;\n        }\n\n        @media (max-width: 768px) {\n            .container { padding: 20px; }\n            h1 { font-size: 1.5em; }\n            .math-box { font-size: 1.1em; }\n        }\n        @media print {\n            body { background-color: #fff; padding: 0; }\n            .container { box-shadow: none; max-width: 100%; padding: 20px; }\n        }\n    \n        body {\n            background: transparent !important;\n            padding: 22px 30px 70px !important;\n            direction: rtl;\n        }\n        .container {\n            max-width: 980px !important;\n            background: transparent !important;\n            box-shadow: none !important;\n            border-radius: 0 !important;\n            padding: 0 !important;\n        }\n        h1, h2, h3 { text-align: right; }\n        .abstract {\n            border-right: 5px solid var(--accent-color) !important;\n            border-left: 0 !important;\n            border-right: 5px solid var(--accent-color) !important;\n        }\n        @media (max-width: 760px) {\n            body { padding: 18px 18px 56px !important; }\n        }\n\n        .references {\n            direction: rtl;\n            text-align: right;\n            list-style-position: inside;\n            margin-top: 12px;\n            padding-right: 0;\n            padding-left: 0;\n            font-size: 0.98rem;\n            line-height: 1.65;\n        }\n        .references li {\n            margin-bottom: 8px;\n            text-align: right;\n        }\n    \n        .author-credit {\n            margin-top: 22px;\n            font-size: 1rem;\n            font-weight: 500;\n        }\n    \n        /* mobile-layout-fix-article */\n        svg { max-width: 100%; height: auto; }\n        @media (max-width: 560px) {\n            body {\n                padding: 14px 12px 48px !important;\n                line-height: 1.7;\n                overflow-x: hidden;\n            }\n            .container { max-width: 100%; }\n            h1 {\n                font-size: 1.34rem !important;\n                line-height: 1.35;\n            }\n            h2 {\n                font-size: 1.08rem;\n                margin-top: 28px;\n            }\n            h3 { font-size: 1rem; }\n            p, ul, ol { font-size: 0.98rem !important; }\n            .abstract,\n            .svg-container { padding: 14px !important; }\n            .math-box {\n                font-size: 0.98rem !important;\n                justify-content: flex-start;\n            }\n        }\n\n        /* mobile-native-v3-article */\n        @media (max-width: 640px) {\n            body {\n                padding: 16px 14px 56px !important;\n                line-height: 1.75;\n                overflow-x: hidden;\n                background: transparent;\n            }\n            .container {\n                width: 100%;\n                max-width: 100%;\n                margin: 0;\n            }\n            h1 {\n                font-size: 1.36rem !important;\n                line-height: 1.35;\n                margin-bottom: 10px;\n            }\n            h2 {\n                font-size: 1.08rem;\n                line-height: 1.45;\n                margin-top: 30px;\n                padding-bottom: 7px;\n            }\n            h3 {\n                font-size: 0.98rem;\n                line-height: 1.45;\n            }\n            p, ul, ol {\n                font-size: 0.98rem !important;\n            }\n            p {\n                text-align: start;\n            }\n            .abstract,\n            .svg-container {\n                padding: 14px !important;\n                border-radius: 8px !important;\n            }\n            .legend {\n                justify-content: flex-start !important;\n                gap: 10px !important;\n            }\n            .math-box {\n                font-size: 0.98rem !important;\n                justify-content: flex-start !important;\n                overflow-x: auto;\n                flex-wrap: nowrap;\n                padding-bottom: 4px;\n            }\n            svg {\n                max-width: 100%;\n                height: auto;\n            }\n            .references {\n                padding-inline-start: 22px !important;\n                overflow-wrap: anywhere;\n            }\n        }\n\n\n        /* mobile-doc-edge-safe-v13 */\n        @media (max-width: 820px) {\n            html,\n            body {\n                width: 100%;\n                max-width: 100%;\n                overflow-x: hidden !important;\n            }\n            *,\n            *::before,\n            *::after {\n                box-sizing: border-box;\n            }\n        }\n\n</style>\n</head>\n<body>\n\n<div class=\"container\">\n    <h1>پارادوکس انضمام و نابسندگی ملاک تحدید مستقل از نظریه معنا</h1>\n    <h3 style=\"text-align: center; margin-top: 0; color: #555;\">نقدی معناشناختی–روش‌شناختی بر دیدگاه کارل پوپر</h3>\n\n    <div class=\"abstract\">\n        <strong>چکیده:</strong><br>\n        کارل پوپر ملاک ابطال‌پذیری را به‌عنوان معیار تحدید علم از شبه‌علم مطرح کرد، بی‌آنکه خود را متعهد به نظریه‌ای درباره معنا بداند. این مقاله استدلال می‌کند که چنین استقلالی ناپایدار است. نشان داده می‌شود که هر ملاک تحدیدی که مستقل از یک شرط معناشناختی حداقلی صورت‌بندی شود، در مواجهه با گزاره‌های مولکولی و نظریه‌های پیچیده علمی فرو می‌پاشد. با تحلیل پارادوکس انضمام، مقاله نشان می‌دهد که در غیاب محدودیت معناشناختی بر گزاره‌های مجاز، می‌توان به‌طور نامحدود گزاره‌های غیرقابل آزمون و بی‌ارتباط تجربی را به یک نظریه منضم کرد، بی‌آنکه پیامدهای مشاهده‌ای آن تغییر یابد. برای حل این مشکل، از مفهوم تضعیف‌شده‌ای از تأییدپذیری دفاع می‌شود؛ نه به‌مثابه تضمین صدق، بلکه به‌عنوان شرط لازم برای قابلیت بررسی منطقی–تجربی. این قید معناشناختی–روش‌شناختی از خودابطال‌گری مصون است و کارایی ملاک تحدید را در سطح نظریه‌های واقعی علم بازمی‌گرداند.\n    </div>\n\n    <p><strong>واژگان کلیدی:</strong> مسئله تحدید، پوپر، پارادوکس انضمام، تأییدپذیری، معنای منطقی، شبه‌علم</p>\n\n    <h2>۱. مقدمه</h2>\n    <p>\n        مسئله تحدید علم از شبه‌علم یکی از مسائل بنیادین فلسفه علم در قرن بیستم است. در میان پاسخ‌های ارائه‌شده، ملاک ابطال‌پذیری کارل پوپر جایگاهی ممتاز دارد. پوپر کوشید علم تجربی را از متافیزیک متمایز کند، بی‌آنکه به نظریه‌های اثبات‌گرایانه معنا متعهد شود. از نظر او، گزاره‌های متافیزیکی می‌توانند معنادار، عقلانی و حتی الهام‌بخش علم باشند، هرچند علمی نیستند.\n    </p>\n    <p>\n        این مقاله انسجام این موضع را به چالش می‌کشد و استدلال می‌کند که هر ملاک تحدیدی که خود را مستقل از نظریه معنا بداند، ممکن است در سطح گزاره‌های اتمی کارآمد باشد، اما در مواجهه با گزاره‌های مولکولی و ساختارهای نظری پیچیده فرو می‌پاشد. این فروپاشی به‌طور مشخص در قالب پارادوکس انضمام رخ می‌نماید.\n    </p>\n\n    <h2>۲. بازسازی مفهوم تأییدپذیری</h2>\n    <p>\n        تمایز اساسی میان اثبات‌پذیری و تأییدپذیری ضروری است. اثبات‌پذیری مستلزم قطعیت و تحقق مستقیم تجربی است، در حالی که تأییدپذیری مفهومی ضعیف‌تر است که هم تقویت فرضیه و هم عدم ابطال آن را در بر می‌گیرد.\n    </p>\n    <p>تأییدپذیری را می‌توان در سه صورت تحلیل کرد:</p>\n    <ol>\n        <li><strong>تأیید مستقیم:</strong> انطباق مستقیم گزاره با داده مشاهده‌ای.</li>\n        <li><strong>تأیید غیرمستقیم از طریق عدم ابطال گزاره‌های کلی:</strong> تقویت فرضیه کلی در اثر ناکامی کوشش‌ها برای ابطال آن.</li>\n        <li><strong>تأیید غیرمستقیم از طریق نتایج مشاهده‌پذیر:</strong> اگر فرضیه‌ای به نتایج مشاهده‌پذیر بینجامد و آن نتایج ابطال نشوند، احتمال صحت فرضیه تقویت می‌شود.</li>\n    </ol>\n    <p>\n        این تحلیل نشان می‌دهد که حتی در چارچوب پوپری نیز نوعی مفهوم حداقلی از تأیید گریزناپذیر است.\n    </p>\n\n    <h2>۳. پارادوکس انضمام و نظریه‌های مولکولی</h2>\n    <p>\n        فرض کنیم مجموعه‌ای از گزاره‌ها داریم:\n    </p>\n    <div class=\"math-box\">\n        T₁, T₂, T₃, T₄\n    </div>\n    <p>\n        و این گزاره‌ها به‌طور استنتاجی به یک نتیجه مشاهده‌پذیر <span class=\"math-inline\">O</span> منتهی می‌شوند:\n    </p>\n    <div class=\"math-box\">\n        T₁, T₂, T₃, T₄ &#10230; O\n    </div>\n    <p>\n        بر اساس منطق کلاسیک، برای هر مجموعه گزاره دلخواه <span class=\"math-inline\">M₁, M₂, ..., Mₙ</span>، داریم:\n    </p>\n    <div class=\"math-box\" style=\"flex-direction: column;\">\n        <div>T₁, T₂, T₃, T₄ &#10230; O</div>\n        <div style=\"font-size: 0.8em; margin: 10px 0;\">پس</div>\n        <div>T₁, T₂, T₃, T₄, M₁, M₂, ..., Mₙ &#10230; O</div>\n    </div>\n    <p>\n        این همان پارادوکس انضمام است. این پارادوکس نشان می‌دهد که می‌توان هر تعداد گزاره غیرقابل آزمون یا متافیزیکی را به نظریه منضم کرد، بی‌آنکه پیامدهای مشاهده‌ای آن تغییر کند.\n    </p>\n    <p>\n        اگر ابطال‌پذیری تنها ملاک تحدید باشد، چنین نظریه‌ای همچنان علمی تلقی خواهد شد، حتی اگر بخش اعظم آن از گزاره‌های غیرعلمی تشکیل شده باشد.\n    </p>\n\n    <h2>۴. ضرورت قید معناشناختی</h2>\n    <p>\n        پارادوکس انضمام تنها زمانی حل می‌شود که شرطی معناشناختی برای ورود گزاره‌ها به نظریه پذیرفته شود. اگر گزاره‌ای اساساً قابلیت تأیید مستقیم یا غیرمستقیم نداشته باشد، آنگاه فاقد معنای منطقی–تجربی است.\n    </p>\n    <p>چنین گزاره‌ای:</p>\n    <ul>\n        <li>نه قابل صدق و کذب است،</li>\n        <li>نه نقشی معرفتی در نظریه ایفا می‌کند،</li>\n        <li>و نه می‌تواند به‌طور معنادار در انضمام‌های منطقی شرکت کند.</li>\n    </ul>\n    <p>\n        بی‌معنایی منطقی در این معنا، مساوی با بی‌معنایی مفهومی یا کاربردی نیست.\n    </p>\n\n    <h2>۵. مطالعه موردی: نظریه عقده حقارت آدلر</h2>\n    <p>\n        نظریه عقده حقارت آدلر نمونه‌ای روشن از این مسئله است. گزاره مرکزی نظریه چنین است:\n    </p>\n    <div class=\"math-box\">\n        T₁: همه انسان‌ها دارای عقده حقارت هستند.\n    </div>\n    <p>\n        این گزاره به‌گونه‌ای صورت‌بندی شده که هر رفتار ممکن انسانی می‌تواند به‌عنوان تأیید آن تفسیر شود. تلاش برای غلبه بر دشواری و نیز اجتناب از آن، هر دو به نفع گزاره تعبیر می‌شوند.\n    </p>\n    <p>\n        در نتیجه، <span class=\"math-inline\">T₁</span> نه فقط ابطال‌ناپذیر، بلکه تأییدناپذیر است. هرچند گزاره‌های فرعی ممکن است پیامدهای مشاهده‌پذیر داشته باشند، گزاره مرکزی فاقد معنای منطقی–تجربی است و نظریه را به شبه‌علم تبدیل می‌کند.\n    </p>\n\n    <h2>۶. آیا اصل تأییدپذیری خودابطال‌گر است؟</h2>\n    <p>\n        اعتراض رایج آن است که اصول معناشناختی خود قابل اثبات یا آزمون تجربی نیستند. این اعتراض جایگاه اصل مورد دفاع در این مقاله را نادرست می‌فهمد.\n    </p>\n    <p>\n        اصل تأییدپذیری ادعای صدق ضروری ندارد، بلکه یک اصل روش‌شناختی تنظیم‌گر است. اعتبار آن به توانایی‌اش در حل مسائل واقعی فلسفه علم وابسته است. اگر نشان داده شود که گزاره‌ای تأییدناپذیر نقشی معرفتی و ضروری در یک نظریه علمی ایفا می‌کند، این اصل تضعیف خواهد شد.\n    </p>\n\n    <h2>۷. نتیجه‌گیری</h2>\n    <p>\n        این مقاله نشان داد که ملاک‌های تحدیدی مستقل از نظریه معنا ناپایدارند. پارادوکس انضمام آشکار می‌کند که ابطال‌پذیری به‌تنهایی نمی‌تواند از ورود محتوای غیرعلمی به نظریه‌های به‌ظاهر علمی جلوگیری کند. ازاین‌رو، یک قید معناشناختی حداقلی مبتنی بر تأییدپذیری ضروری است.\n    </p>\n    <p>\n        تأییدپذیری نه به‌عنوان تضمین صدق، بلکه به‌عنوان شرط امکان بررسی منطقی–تجربی، پیوندی ضروری میان معنا و تحدید برقرار می‌کند.\n    </p>\n\n\n    <h2>منابع</h2>\n    <ol class=\"references\" dir=\"rtl\">\n        <li>آیر، آ. ج. (1936). <em>زبان، حقیقت و منطق</em>. ویکتور گولانز.</li>\n        <li>کارنپ، ر. (1936). آزمون‌پذیری و معنا. <em>فلسفه علم، 3</em>(4)، 419-471.</li>\n        <li>همپل، ک. گ. (1950). مسائل و دگرگونی‌ها در معیار تجربه‌گرایانه معنا. <em>روو اینترناسیونال دو فیلوزوفی، 4</em>(11)، 41-63.</li>\n        <li>لاکاتوش، ا. (1978). <em>روش‌شناسی برنامه‌های پژوهشی علمی</em>. انتشارات دانشگاه کمبریج.</li>\n        <li>پوپر، ک. ر. (1959). <em>منطق اکتشاف علمی</em>. هاچینسون.</li>\n        <li>پوپر، ک. ر. (1963). <em>حدس‌ها و ابطال‌ها: رشد معرفت علمی</em>. راتلج و کیگان پل.</li>\n        <li>پوپر، ک. ر. (1974). پاسخ‌هایی به منتقدان من. در پ. آ. شیلپ (ویراستار)، <em>فلسفه کارل پوپر</em>. اوپن کورت.</li>\n        <li>تاگارد، پ. ر. (1978). چرا اخترگویی شبه‌علم است. <em>مجموعه مقالات نشست دوسالانه انجمن فلسفه علم، 1978</em>(1)، 223-234.</li>\n    </ol>\n    <p class=\"author-credit\" dir=\"rtl\"><strong>نویسنده:</strong> محمد حسین براتی</p>\n\n\n</div>\n\n</body>\n</html>"}, "tools": {"pdisk": "<!DOCTYPE html>\n<html lang=\"fa\" dir=\"rtl\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>هندسه هذلولوی و ترکیب تبدیلات موبیوس</title>\n    <style>\n        body { font-family: Tahoma, Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }\n        .container { display: flex; gap: 20px; max-width: 1300px; width: 100%; }\n        .canvas-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; flex-grow: 1; }\n        canvas { background-color: #fff; border-radius: 10px; border: 1px solid #ddd; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); max-width: 100%; }\n        .controls { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; flex-shrink: 0; height: fit-content; }\n        .box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-right: 4px solid #4CAF50; }\n        .box h3 { margin-top: 0; font-size: 1.05em; color: #2c3e50; margin-bottom: 10px; }\n        .input-row { display: flex; align-items: center; margin-bottom: 8px; justify-content: space-between; font-size: 0.85em; }\n        input[type=\"range\"] { width: 50%; }\n        input[type=\"number\"] { width: 45px; padding: 4px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }\n        button { background: #4CAF50; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-family: Tahoma; margin-bottom: 8px; font-weight: bold; transition: background 0.3s; }\n        button:hover { filter: brightness(1.1); }\n        .btn-clear { background: #e74c3c; }\n        .btn-toggle { background: #9
