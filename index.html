n            .controls button {\n                width: 100% !important;\n                min-height: 24px !important;\n                padding: 4px 6px !important;\n                margin: 0 0 4px 0 !important;\n                border-radius: 6px !important;\n                font-size: 0.62rem !important;\n                line-height: 1.15 !important;\n            }\n            .controls .math-small {\n                font-size: 0.68rem !important;\n                line-height: 1.1 !important;\n                margin: 2px 0 5px 0 !important;\n            }\n        }\n        @media (max-width: 430px) {\n            .controls {\n                height: 20dvh !important;\n                max-height: 20dvh !important;\n                padding: 17px 7px calc(7px + env(safe-area-inset-bottom)) !important;\n            }\n            .controls > .box,\n            .controls > .box:not(:first-of-type),\n            .controls > .box:first-of-type {\n                padding: 5px !important;\n                margin-bottom: 5px !important;\n            }\n            .controls .box h3,\n            .controls > .box h3 {\n                font-size: 0.60rem !important;\n            }\n            .controls .input-row,\n            .controls .input-row label,\n            .controls .input-row div,\n            .controls button,\n            .controls input[type=\"number\"] {\n                font-size: 0.56rem !important;\n            }\n        }\n\n\n\n        /* mobile-pdisk-control-content-v12-slightly-larger */\n        @media (max-width: 820px) {\n            .controls {\n                height: 21dvh !important;\n                max-height: 21dvh !important;\n                padding: 19px 9px calc(9px + env(safe-area-inset-bottom)) !important;\n                font-size: 0.70rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls > .box,\n            .controls > .box:not(:first-of-type),\n            .controls > .box:first-of-type {\n                padding: 7px !important;\n                margin: 0 0 7px 0 !important;\n                border-radius: 9px !important;\n                font-size: 0.70rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls .box h3,\n            .controls > .box h3,\n            .controls > .box:first-of-type h3 {\n                font-size: 0.72rem !important;\n                line-height: 1.2 !important;\n                margin: 0 0 5px 0 !important;\n            }\n            .controls .input-row {\n                gap: 4px !important;\n                margin: 0 0 6px 0 !important;\n                font-size: 0.68rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls .input-row label,\n            .controls .input-row div {\n                font-size: 0.68rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls input[type=\"range\"] {\n                min-height: 22px !important;\n                height: 22px !important;\n            }\n            .controls input[type=\"number\"] {\n                width: 54px !important;\n                min-height: 26px !important;\n                height: 26px !important;\n                padding: 2px 4px !important;\n                font-size: 0.70rem !important;\n            }\n            .controls button {\n                min-height: 28px !important;\n                padding: 5px 7px !important;\n                margin: 0 0 5px 0 !important;\n                border-radius: 7px !important;\n                font-size: 0.70rem !important;\n                line-height: 1.2 !important;\n            }\n            .controls .math-small {\n                font-size: 0.74rem !important;\n                line-height: 1.15 !important;\n                margin: 3px 0 6px 0 !important;\n            }\n        }\n        @media (max-width: 430px) {\n            .controls {\n                height: 20dvh !important;\n                max-height: 20dvh !important;\n                padding: 18px 8px calc(8px + env(safe-area-inset-bottom)) !important;\n            }\n            .controls > .box,\n            .controls > .box:not(:first-of-type),\n            .controls > .box:first-of-type {\n                padding: 6px !important;\n                margin-bottom: 6px !important;\n            }\n            .controls .box h3,\n            .controls > .box h3 {\n                font-size: 0.66rem !important;\n            }\n            .controls .input-row,\n            .controls .input-row label,\n            .controls .input-row div,\n            .controls button,\n            .controls input[type=\"number\"] {\n                font-size: 0.64rem !important;\n            }\n            .controls button {\n                min-height: 27px !important;\n            }\n            .controls input[type=\"number\"] {\n                min-height: 25px !important;\n                height: 25px !important;\n            }\n        }\n\n\n\n        /* mobile-pdisk-panel-edge-v13 */\n        @media (max-width: 820px) {\n            html,\n            body {\n                width: 100%;\n                max-width: 100%;\n                overflow-x: hidden !important;\n            }\n            *,\n            *::before,\n            *::after {\n                box-sizing: border-box;\n            }\n            .container,\n            .canvas-container,\n            .controls {\n                max-width: 100% !important;\n                min-width: 0 !important;\n            }\n            .controls {\n                height: 23dvh !important;\n                max-height: 23dvh !important;\n            }\n            .canvas-container {\n                padding-left: max(12px, env(safe-area-inset-left)) !important;\n                padding-right: max(12px, env(safe-area-inset-right)) !important;\n                padding-bottom: 78px !important;\n                overflow-x: hidden !important;\n            }\n            canvas {\n                max-width: calc(100vw - 24px) !important;\n            }\n        }\n        @media (max-width: 430px) {\n            .controls {\n                height: 22dvh !important;\n                max-height: 22dvh !important;\n            }\n            .canvas-container {\n                padding-left: max(10px, env(safe-area-inset-left)) !important;\n                padding-right: max(10px, env(safe-area-inset-right)) !important;\n            }\n            canvas {\n                max-width: calc(100vw - 20px) !important;\n            }\n        }\n\n</style>\n</head>\n<body>\n\n<div class=\"container\">\n    <div class=\"controls\">\n        \n        <!-- فرمول اصلی موبیوس برگردانده شد -->\n        <div class=\"box\">\n            <h3>فرمول تبدیل موبیوس</h3>\n            <math>\n                <mrow>\n                    <mi>f</mi><mo>(</mo><mi>z</mi><mo>)</mo><mo>=</mo>\n                    <mfrac>\n                        <mrow><mi mathvariant=\"normal\">a</mi><mi>z</mi><mo>+</mo><mi mathvariant=\"normal\">b</mi></mrow>\n                        <mrow><mover><mi mathvariant=\"normal\">b</mi><mo>¯</mo></mover><mi>z</mi><mo>+</mo><mover><mi mathvariant=\"normal\">a</mi><mo>¯</mo></mover></mrow>\n                    </mfrac>\n                </mrow>\n            </math>\n        </div>\n\n        <div class=\"box\" style=\"border-right-color: #2196F3;\">\n            <h3>۱. پارامترهای هندسی</h3>\n            <div class=\"input-row\">\n                <label>زوم (Zoom):</label>\n                <input type=\"range\" id=\"sl_zoom\" min=\"40\" max=\"350\" value=\"150\">\n            </div>\n            <div class=\"input-row\">\n                <label>فاصله مرکز (d): <span id=\"val_d\">2.00</span></label>\n                <input type=\"range\" id=\"sl_d\" min=\"1.01\" max=\"5.0\" step=\"0.01\" value=\"2.0\">\n            </div>\n            <div class=\"input-row\">\n                <label>زاویه (θ): <span id=\"val_theta\">45°</span></label>\n                <input type=\"range\" id=\"sl_theta\" min=\"0\" max=\"360\" value=\"45\">\n            </div>\n            <button id=\"btnAdd\" style=\"background: #2196F3;\">➕ ثبت ژئودزیک</button>\n            <button id=\"btnToggleGuides\" class=\"btn-toggle\">👁️ مخفی کردن خط‌چین‌ها</button>\n        </div>\n\n        <div class=\"box\" id=\"box_t1\" style=\"border-right-color: #FF9800;\">\n            <h3>۲. تبدیل موبیوس فعلی (T1)</h3>\n            <div class=\"input-row\">\n                <label>a1 (حقیقی, موهومی):</label>\n                <div><input type=\"number\" id=\"a_r\" value=\"1\" step=\"0.1\"> + i <input type=\"number\" id=\"a_i\" value=\"0\" step=\"0.1\"></div>\n            </div>\n            <div class=\"input-row\">\n                <label>b1 (حقیقی, موهومی):</label>\n                <div><input type=\"number\" id=\"b_r\" value=\"0\" step=\"0.1\"> + i <input type=\"number\" id=\"b_i\" value=\"0\" step=\"0.1\"></div>\n            </div>\n            <button id=\"btnTransform\" style=\"background: #FF9800;\">اعمال تبدیل T1</button>\n        </div>\n\n        <div class=\"box\" style=\"border-right-color: #8e44ad;\">\n            <h3>۳. ترکیب با تبدیل جدید (T2)</h3>\n            <math class=\"math-small\">\n                <mrow><msub><mi>T</mi><mi>new</mi></msub><mo>=</mo><msub><mi>T</mi><mn>2</mn></msub><mo>∘</mo><msub><mi>T</mi><mn>1</mn></msub></mrow>\n            </math>\n            <div class=\"input-row\">\n                <label>a2 (حقیقی, موهومی):</label>\n                <div><input type=\"number\" id=\"a2_r\" value=\"1\" step=\"0.1\"> + i <input type=\"number\" id=\"a2_i\" value=\"0\" step=\"0.1\"></div>\n            </div>\n            <div class=\"input-row\">\n                <label>b2 (حقیقی, موهومی):</label>\n                <div><input type=\"number\" id=\"b2_r\" value=\"0\" step=\"0.1\"> + i <input type=\"number\" id=\"b2_i\" value=\"0\" step=\"0.1\"></div>\n            </div>\n            <button id=\"btnCompose\" class=\"btn-compose\">ترکیب T2 با T1 و اعمال</button>\n        </div>\n\n        <button id=\"btnClear\" class=\"btn-clear\">🗑️ پاک کردن همه</button>\n    </div>\n\n    <div class=\"canvas-container\">\n        <canvas id=\"canvas\" width=\"800\" height=\"800\"></canvas>\n    </div>\n</div>\n\n<script>\n    const canvas = document.getElementById('canvas');\n    const ctx = canvas.getContext('2d');\n    const cx = canvas.width / 2;\n    const cy = canvas.height / 2;\n\n    let geodesics = [];\n    let showGuides = true;\n    const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#3498db', '#1abc9c', '#2c3e50'];\n\n    // توابع ریاضی اعداد مختلط\n    function complexAdd(c1, c2) { return {r: c1.r + c2.r, i: c1.i + c2.i}; }\n    function complexMult(c1, c2) { return {r: c1.r*c2.r - c1.i*c2.i, i: c1.r*c2.i + c1.i*c2.r}; }\n    function complexConj(c) { return {r: c.r, i: -c.i}; }\n    function complexDiv(c1, c2) {\n        let denMag2 = c2.r*c2.r + c2.i*c2.i;\n        if (denMag2 < 1e-10) return {r: 1e5, i: 1e5};\n        return {r: (c1.r*c2.r + c1.i*c2.i)/denMag2, i: (c1.i*c2.r - c1.r*c2.i)/denMag2};\n    }\n\n    function getFullCircle(d, theta_deg) {\n        let theta = theta_deg * Math.PI / 180;\n        let r_circle = Math.sqrt(d*d - 1);\n        let center = { x: d * Math.cos(theta), y: d * Math.sin(theta) };\n        let pts = [];\n        const steps = 400; \n        for (let i = 0; i <= steps; i++) {\n            let t = (2 * Math.PI) * (i / steps);\n            pts.push({ x: center.x + r_circle * Math.cos(t), y: center.y + r_circle * Math.sin(t) });\n        }\n        return { points: pts, center: center };\n    }\n\n    function getCenterLine(center) {\n        let pts = [];\n        for(let i=0; i<=50; i++) pts.push({ x: center.x * (i/50), y: center.y * (i/50) });\n        return pts;\n    }\n\n    function applyMobius(pt, a, b) {\n        let z = {r: pt.x, i: pt.y};\n        let num = complexAdd(complexMult(a, z), b);\n        let den = complexAdd(complexMult(complexConj(b), z), complexConj(a));\n        let res = complexDiv(num, den);\n        return {x: Math.max(-1e5, Math.min(1e5, res.r)), y: Math.max(-1e5, Math.min(1e5, res.i))};\n    }\n\n    function drawPath(pts, R, colorInside, colorOutside, widthInside, widthOutside, dashInside, dashOutside, drawOutside) {\n        let a = {r: parseFloat(document.getElementById('a_r').value), i: parseFloat(document.getElementById('a_i').value)};\n        let b = {r: parseFloat(document.getElementById('b_r').value), i: parseFloat(document.getElementById('b_i').value)};\n        \n        let tPts = pts.map(p => applyMobius(p, a, b));\n        \n        if (drawOutside) {\n            ctx.save();\n            ctx.beginPath();\n            ctx.rect(0, 0, canvas.width, canvas.height); \n            ctx.arc(cx, cy, R, 0, 2*Math.PI, true);\n            ctx.clip(); \n            ctx.beginPath();\n            ctx.moveTo(cx + tPts[0].x*R, cy - tPts[0].y*R);\n            for(let i=1; i<tPts.length; i++) ctx.lineTo(cx + tPts[i].x*R, cy - tPts[i].y*R);\n            ctx.strokeStyle = colorOutside; ctx.lineWidth = widthOutside; ctx.setLineDash(dashOutside); ctx.stroke();\n            ctx.restore();\n        }\n        \n        ctx.save();\n        ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI); ctx.clip(); \n        ctx.beginPath(); ctx.moveTo(cx + tPts[0].x*R, cy - tPts[0].y*R);\n        for(let i=1; i<tPts.length; i++) ctx.lineTo(cx + tPts[i].x*R, cy - tPts[i].y*R);\n        ctx.strokeStyle = colorInside; ctx.lineWidth = widthInside; ctx.setLineDash(dashInside); ctx.stroke();\n        ctx.restore();\n    }\n\n    function draw() {\n        ctx.clearRect(0, 0, canvas.width, canvas.height);\n        let R = parseFloat(document.getElementById('sl_zoom').value);\n        let d = parseFloat(document.getElementById('sl_d').value);\n        let theta = parseFloat(document.getElementById('sl_theta').value);\n        \n        document.getElementById('val_d').innerText = d.toFixed(2);\n        document.getElementById('val_theta').innerText = theta + '°';\n\n        ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI);\n        ctx.fillStyle = '#ffffff'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#2c3e50'; ctx.stroke();\n\n        geodesics.forEach((geo, idx) => {\n            let col = colors[idx % colors.length];\n            if (showGuides) drawPath(geo.centerLine, R, '#9b59b6', '#9b59b6', 3, 1.5, [6, 4], [6, 4], true);\n            drawPath(geo.points, R, col, col, 5, 1.5, [], [6, 4], showGuides);\n        });\n\n        let preview = getFullCircle(d, theta);\n        if (showGuides) drawPath(getCenterLine(preview.center), R, '#9b59b6', '#9b59b6', 3, 1.5, [6, 4], [6, 4], true);\n        drawPath(preview.points, R, '#2ecc71', 'rgba(150, 150, 150, 0.8)', 5, 1.5, [], [6, 4], showGuides);\n    }\n\n    // --- ماژول ترکیب تبدیلات موبیوس ---\n    document.getElementById('btnCompose').addEventListener('click', () => {\n        // دریافت T1\n        let a1 = {r: parseFloat(document.getElementById('a_r').value), i: parseFloat(document.getElementById('a_i').value)};\n        let b1 = {r: parseFloat(document.getElementById('b_r').value), i: parseFloat(document.getElementById('b_i').value)};\n        \n        // دریافت T2\n        let a2 = {r: parseFloat(document.getElementById('a2_r').value), i: parseFloat(document.getElementById('a2_i').value)};\n        let b2 = {r: parseFloat(document.getElementById('b2_r').value), i: parseFloat(document.getElementById('b2_i').value)};\n\n        // محاسبه A = a2*a1 + b2*conj(b1)\n        let term1_A = complexMult(a2, a1);\n        let term2_A = complexMult(b2, complexConj(b1));\n        let A = complexAdd(term1_A, term2_A);\n\n        // محاسبه B = a2*b1 + b2*conj(a1)\n        let term1_B = complexMult(a2, b1);\n        let term2_B = complexMult(b2, complexConj(a1));\n        let B = complexAdd(term1_B, term2_B);\n\n        // جایگذاری در T1 و گرد کردن\n        document.getElementById('a_r').value = A.r.toFixed(3);\n        document.getElementById('a_i').value = A.i.toFixed(3);\n        document.getElementById('b_r').value = B.r.toFixed(3);\n        document.getElementById('b_i').value = B.i.toFixed(3);\n\n        // ریست کردن فرم T2\n        document.getElementById('a2_r').value = 1; document.getElementById('a2_i').value = 0;\n        document.getElementById('b2_r').value = 0; document.getElementById('b2_i').value = 0;\n\n        // هایلایت کردن موقت باکس 2 برای نشان دادن تغییر\n        let box1 = document.getElementById('box_t1');\n        box1.style.backgroundColor = '#fff3e0';\n        setTimeout(() => box1.style.backgroundColor = '#f9f9f9', 500);\n\n        draw();\n    });\n\n    document.getElementById('sl_zoom').addEventListener('input', draw);\n    document.getElementById('sl_d').addEventListener('input', draw);\n    document.getElementById('sl_theta').addEventListener('input', draw);\n    document.getElementById('btnTransform').addEventListener('click', draw);\n\n    const btnToggleGuides = document.getElementById('btnToggleGuides');\n    btnToggleGuides.addEventListener('click', () => {\n        showGuides = !showGuides;\n        if (showGuides) { btnToggleGuides.innerText = \"👁️ مخفی کردن خط‌چین‌ها\"; btnToggleGuides.style.background = \"#9b59b6\"; } \n        else { btnToggleGuides.innerText = \"👁️ نمایش خط‌چین‌ها\"; btnToggleGuides.style.background = \"#7f8c8d\"; }\n        draw();\n    });\n\n    document.getElementById('btnAdd').addEventListener('click', () => {\n        let d = parseFloat(document.getElementById('sl_d').value), theta = parseFloat(document.getElementById('sl_theta').value);\n        let circleData = getFullCircle(d, theta);\n        geodesics.push({ points: circleData.points, centerLine: getCenterLine(circleData.center) });\n        draw();\n    });\n\n    document.getElementById('btnClear').addEventListener('click', () => {\n        geodesics = [];\n        document.getElementById('a_r').value = 1; document.getElementById('a_i').value = 0;\n        document.getElementById('b_r').value = 0; document.getElementById('b_i').value = 0;\n        draw();\n    });\n\n    draw();\n<\/script>\n\n<script>\n(function () {\n    const mobileQuery = window.matchMedia('(max-width: 820px)');\n\n    function isMobile() {\n        return mobileQuery.matches;\n    }\n\n    function setupPdiskFormula() {\n        const panel = document.querySelector('.controls');\n        const container = document.querySelector('.container');\n        if (!panel || !container || panel.dataset.formulaDockReady === '1') return;\n\n        const formula = Array.prototype.find.call(panel.children, (child) => child.classList && child.classList.contains('box'));\n        if (!formula) return;\n\n        panel.dataset.formulaDockReady = '1';\n        const homeParent = panel;\n        const homeNext = formula.nextSibling;\n\n        function placeFormula() {\n            if (isMobile()) {\n                formula.classList.add('mobile-formula-card');\n                if (formula.parentNode !== container) {\n                    container.insertBefore(formula, panel);\n                }\n            } else {\n                formula.classList.remove('mobile-formula-card');\n                if (formula.parentNode !== homeParent) {\n                    homeParent.insertBefore(formula, homeNext);\n                }\n            }\n        }\n\n        placeFormula();\n        if (mobileQuery.addEventListener) {\n            mobileQuery.addEventListener('change', placeFormula);\n        } else if (mobileQuery.addListener) {\n            mobileQuery.addListener(placeFormula);\n        }\n    }\n\n    function setupMobileSheet(selector) {\n        const panel = document.querySelector(selector);\n        if (!panel || panel.dataset.mobileSheetReady === '1') return;\n        panel.dataset.mobileSheetReady = '1';\n\n        let grip = panel.querySelector('.sheet-grip');\n        if (!grip) {\n            grip = document.createElement('div');\n            grip.className = 'sheet-grip';\n            panel.prepend(grip);\n        }\n        grip.setAttribute('aria-hidden', 'true');\n\n        let startY = 0;\n        let lastY = 0;\n        let dragging = false;\n\n        function setCollapsed(value) {\n            if (!isMobile()) return;\n            document.body.classList.toggle('sheet-collapsed', value);\n        }\n\n        if (isMobile()) {\n            document.body.classList.remove('sheet-collapsed');\n        }\n\n        grip.addEventListener('pointerdown', (event) => {\n            if (!isMobile()) return;\n            dragging = true;\n            startY = event.clientY;\n            lastY = event.clientY;\n            grip.setPointerCapture?.(event.pointerId);\n            event.preventDefault();\n        });\n\n        grip.addEventListener('pointermove', (event) => {\n            if (!dragging) return;\n            lastY = event.clientY;\n            event.preventDefault();\n        });\n\n        function finish(event) {\n            if (!dragging) return;\n            const delta = lastY - startY;\n            if (Math.abs(delta) < 12) {\n                setCollapsed(!document.body.classList.contains('sheet-collapsed'));\n            } else if (delta > 0) {\n                setCollapsed(true);\n            } else {\n                setCollapsed(false);\n            }\n            dragging = false;\n            event.preventDefault();\n        }\n\n        grip.addEventListener('pointerup', finish);\n        grip.addEventListener('pointercancel', finish);\n    }\n\n    setupPdiskFormula();\n    setupMobileSheet('.controls');\n})();\n<\/script>\n\n<script>\n(function () {\n    const mobileQuery = window.matchMedia('(max-width: 820px)');\n\n    function firstFormulaBox() {\n        return document.querySelector('.mobile-formula-card') ||\n            document.querySelector('.controls > .box');\n    }\n\n    function separateFormulaLayer() {\n        const formula = firstFormula  [];\n            greatCircles = [];\n            facingTriangle = null;\n            document.getElementById('info-panel').style.display = 'none';\n        });\n\n        // --- توابع ریاضیات ---\n        function rotate3D(x, y, z, angleX, angleY) {\n            let x1 = x * Math.cos(angleY) - z * Math.sin(angleY);\n            let z1 = x * Math.sin(angleY) + z * Math.cos(angleY);\n            let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX);\n            let z2 = y * Math.sin(angleX) + z1 * Math.cos(angleX);\n            return { x: x1, y: y2, z: z2 };\n        }\n\n        function getSpherePoint(inputX, inputY) {\n            let dx = inputX - cx;\n            let dy = inputY - cy;\n            let dSq = dx * dx + dy * dy;\n            \n            if (dSq > R * R) {\n                let len = Math.sqrt(dSq);\n                dx = (dx / len) * R;\n                dy = (dy / len) * R;\n                dSq = R * R;\n            }\n            \n            let dz = Math.sqrt(Math.max(0, R * R - dSq));\n            let p1 = rotate3D(dx, dy, dz, -rotX, 0); \n            let p2 = rotate3D(p1.x, p1.y, p1.z, 0, -rotY);\n            \n            let len = Math.sqrt(p2.x*p2.x + p2.y*p2.y + p2.z*p2.z);\n            return { x: p2.x/len, y: p2.y/len, z: p2.z/len };\n        }\n\n        function crossProduct(v1, v2) {\n            return { x: v1.y * v2.z - v1.z * v2.y, y: v1.z * v2.x - v1.x * v2.z, z: v1.x * v2.y - v1.y * v2.x };\n        }\n\n        function dotProduct(v1, v2) {\n            return v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;\n        }\n\n        function normalize(v) {\n            let len = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);\n            if (len === 0) return {x:0, y:0, z:1};\n            return { x: v.x/len, y: v.y/len, z: v.z/len };\n        }\n\n        function multiplyScalar(v, s) {\n            return {x: v.x * s, y: v.y * s, z: v.z * s};\n        }\n\n        // تابع جدید: بررسی می‌کند آیا همه دایره‌های عظیمه از یک محور مشترک عبور کرده‌اند\n        function areCirclesCoaxial(circles) {\n            if (circles.length < 3) return true;\n            \n            let axis = null;\n            // پیدا کردن دو بردار نرمال که با هم موازی نیستند تا محور تقاطع پیدا شود\n            for (let i = 0; i < circles.length - 1; i++) {\n                for (let j = i + 1; j < circles.length; j++) {\n                    let cp = crossProduct(circles[i].normal, circles[j].normal);\n                    let len = Math.sqrt(cp.x*cp.x + cp.y*cp.y + cp.z*cp.z);\n                    if (len > 0.05) { \n                        axis = { x: cp.x/len, y: cp.y/len, z: cp.z/len };\n                        break;\n                    }\n                }\n                if (axis) break;\n            }\n            \n            if (!axis) return true; // اگر تمام دایره‌ها کاملاً روی هم هستند\n            \n            // بررسی هم‌محور بودن سایر دایره‌ها با کمی تلورانس برای لمس انگشت (حدود 4.5 درجه خطای مجاز)\n            for (let i = 0; i < circles.length; i++) {\n                let d = dotProduct(circles[i].normal, axis);\n                if (Math.abs(d) > 0.08) { \n                    return false; // حداقل یک دایره خارج از تقاطع مشترک است\n                }\n            }\n            return true;\n        }\n\n        // --- تعاملات موس و تاچ ---\n        function handleStart(x, y) {\n            isDragging = true;\n            lastInput = { x: x, y: y };\n\n            if (mode === 'point') {\n                let v = getSpherePoint(x, y);\n                activePointPair = v;\n                pointPairs.push(activePointPair);\n            } \n            else if (mode === 'circle') {\n                // شرط هوشمند: اگر بیشتر از 3 دایره باشد ولی همگی از یک نقطه رد نشوند، متوقف کن\n                if (greatCircles.length >= 3 && !areCirclesCoaxial(greatCircles)) {\n                    alert('شما ۳ دایره رسم کرده‌اید که یک مثلث را تشکیل داده‌اند. برای رسم مجدد، صفحه را پاک کنید.');\n                    isDragging = false;\n                    return;\n                }\n                circleStartVec = getSpherePoint(x, y);\n                activeCircleNormal = {x: 0, y: 0, z: 1};\n                greatCircles.push({ normal: activeCircleNormal });\n            }\n        }\n\n        function handleMove(x, y) {\n            if (!isDragging) return;\n\n            let deltaX = x - lastInput.x;\n            let deltaY = y - lastInput.y;\n\n            if (mode === 'orbit') {\n                rotY += deltaX * 0.01;\n                rotX -= deltaY * 0.01;\n                rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));\n            } \n            else if (mode === 'point' && activePointPair) {\n                let v = getSpherePoint(x, y);\n                activePointPair.x = v.x;\n                activePointPair.y = v.y;\n                activePointPair.z = v.z;\n            }\n            else if (mode === 'circle' && circleStartVec) {\n                let currentVec = getSpherePoint(x, y);\n                let normal = crossProduct(circleStartVec, currentVec);\n                \n                if (normal.x*normal.x + normal.y*normal.y + normal.z*normal.z > 0.0001) {\n                    let normNormal = normalize(normal);\n                    let circle = greatCircles[greatCircles.length - 1];\n                    circle.normal.x = normNormal.x;\n                    circle.normal.y = normNormal.y;\n                    circle.normal.z = normNormal.z;\n                }\n            }\n\n            lastInput = { x: x, y: y };\n        }\n\n        function handleEnd() {\n            isDragging = false;\n            activePointPair = null;\n            circleStartVec = null;\n        }\n\n        canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));\n        canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));\n        window.addEventListener('mouseup', handleEnd);\n\n        canvas.addEventListener('touchstart', (e) => {\n            e.preventDefault(); \n            if (e.touches.length > 0) handleStart(e.touches[0].clientX, e.touches[0].clientY);\n        }, { passive: false });\n\n        canvas.addEventListener('touchmove', (e) => {\n            e.preventDefault();\n            if (e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY);\n        }, { passive: false });\n\n        window.addEventListener('touchend', handleEnd);\n        window.addEventListener('touchcancel', handleEnd);\n\n        // --- پیدا کردن مثلثِ روبه‌رو ---\n        let lastTriId = \"\";\n        let lastRadius = -1;\n\n        function updateFacingTriangle() {\n            // جلوگیری از تشکیل و محاسبه مثلث تا زمان رها کردن کلیک موس در حالت رسم دایره\n            if (isDragging && mode === 'circle') {\n                facingTriangle = null;\n                document.getElementById('info-panel').style.display = 'none';\n                lastTriId = \"\";\n                return;\n            }\n\n            // اگر تعداد دایره‌ها دقیقاً 3 تا نبود (مثلث تشکیل نمی‌شود)، محاسبات پنل را مخفی کن\n            if (greatCircles.length !== 3) {\n                facingTriangle = null;\n                document.getElementById('info-panel').style.display = 'none';\n                lastTriId = \"\";\n                return;\n            }\n\n            // ⭐ اضافه شد: اگر 3 دایره رسم شده ولی همگی هم‌محور هستند، مثلثی تشکیل نمی‌شود!\n            if (areCirclesCoaxial(greatCircles)) {\n                facingTriangle = null;\n                document.getElementById('info-panel').style.display = 'none';\n                lastTriId = \"\";\n                return;\n            }\n\n            let N1 = greatCircles[0].normal;\n            let N2 = greatCircles[1].normal;\n            let N3 = greatCircles[2].normal;\n\n            let bestZ = -Infinity;\n            let bestTri = null;\n            \n            let signs = [1, -1];\n            for(let s1 of signs) {\n                for(let s2 of signs) {\n                    for(let s3 of signs) {\n                        let m1 = multiplyScalar(N1, s1);\n                        let m2 = multiplyScalar(N2, s2);\n                        let m3 = multiplyScalar(N3, s3);\n                        \n                        let cross23 = crossProduct(m2, m3);\n                        let D = dotProduct(m1, cross23);\n                        \n                        if (Math.abs(D) < 0.001) continue; \n                        \n                        let signD = Math.sign(D);\n                        let v1 = normalize(multiplyScalar(cross23, signD));\n                        let v2 = normalize(multiplyScalar(crossProduct(m3, m1), signD));\n                        let v3 = normalize(multiplyScalar(crossProduct(m1, m2), signD));\n                        \n                        let center = normalize({x: v1.x+v2.x+v3.x, y: v1.y+v2.y+v3.y, z: v1.z+v2.z+v3.z});\n                        let rotatedCenter = rotate3D(center.x, center.y, center.z, rotX, rotY);\n                        \n                        if (rotatedCenter.z > bestZ) {\n                            bestZ = rotatedCenter.z;\n                            \n                            let alpha = Math.PI - Math.acos(Math.max(-1, Math.min(1, dotProduct(m2, m3))));\n                            let beta  = Math.PI - Math.acos(Math.max(-1, Math.min(1, dotProduct(m1, m3))));\n                            let gamma = Math.PI - Math.acos(Math.max(-1, Math.min(1, dotProduct(m1, m2))));\n                            \n                            let id = `${s1},${s2},${s3}`;\n                            bestTri = { id, v1, v2, v3, alpha, beta, gamma };\n                        }\n                    }\n                }\n            }\n\n            if (bestTri) {\n                facingTriangle = bestTri;\n                \n                if (bestTri.id !== lastTriId || physicalRadius !== lastRadius) {\n                    let area = Math.pow(physicalRadius, 2) * (bestTri.alpha + bestTri.beta + bestTri.gamma - Math.PI);\n\n                    document.getElementById('val-alpha').innerText = (bestTri.alpha * 180 / Math.PI).toFixed(1) + \"°\";\n                    document.getElementById('val-beta').innerText = (bestTri.beta * 180 / Math.PI).toFixed(1) + \"°\";\n                    document.getElementById('val-gamma').innerText = (bestTri.gamma * 180 / Math.PI).toFixed(1) + \"°\";\n                    document.getElementById('val-area').innerText = Math.abs(area).toFixed(2);\n                    \n                    document.getElementById('info-panel').style.display = 'block';\n                    lastTriId = bestTri.id;\n                    lastRadius = physicalRadius;\n                }\n            } else {\n                facingTriangle = null;\n                document.getElementById('info-panel').style.display = 'none';\n                lastTriId = \"\";\n            }\n        }\n\n        // --- ترسیم ---\n        function drawSphereBase() {\n            ctx.beginPath();\n            ctx.arc(cx, cy, R, 0, Math.PI * 2);\n            let grad = ctx.createRadialGradient(cx - R*0.3, cy - R*0.3, R*0.1, cx, cy, R);\n            grad.addColorStop(0, 'rgba(59, 130, 246, 0.4)');\n            grad.addColorStop(1, 'rgba(30, 58, 138, 0.7)');\n            ctx.fillStyle = grad;\n            ctx.fill();\n            ctx.lineWidth = 1;\n            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';\n            ctx.stroke();\n\n            drawCircle({x: 0, y: 1, z: 0}, 'rgba(255,255,255,0.15)', false);\n            drawCircle({x: 1, y: 0, z: 0}, 'rgba(255,255,255,0.15)', false);\n        }\n\n        function drawCircle(normal, color, isHighlight = true) {\n            let u = {x: 0, y: 1, z: 0};\n            if (Math.abs(normal.y) > 0.9) u = {x: 1, y: 0, z: 0};\n            let v1 = normalize(crossProduct(normal, u));\n            let v2 = normalize(crossProduct(normal, v1));\n\n            let segments = 100;\n            let points = [];\n\n            for (let i = 0; i <= segments; i++) {\n                let angle = (i / segments) * Math.PI * 2;\n                let px = v1.x * Math.cos(angle) + v2.x * Math.sin(angle);\n                let py = v1.y * Math.cos(angle) + v2.y * Math.sin(angle);\n                let pz = v1.z * Math.cos(angle) + v2.z * Math.sin(angle);\n                let pRot = rotate3D(px, py, pz, rotX, rotY);\n                points.push({ x: cx + pRot.x * R, y: cy + pRot.y * R, z: pRot.z });\n            }\n\n            ctx.beginPath();\n            for (let i = 0; i < segments; i++) {\n                if ((points[i].z + points[i+1].z) / 2 < 0) {\n                    ctx.moveTo(points[i].x, points[i].y);\n                    ctx.lineTo(points[i+1].x, points[i+1].y);\n                }\n            }\n            ctx.strokeStyle = color.replace(/[\\d\\.]+\\)$/g, '0.2)');\n            ctx.lineWidth = isHighlight ? 2 : 1;\n            ctx.setLineDash([5, 5]);\n            ctx.stroke();\n\n            ctx.beginPath();\n            for (let i = 0; i < segments; i++) {\n                if ((points[i].z + points[i+1].z) / 2 >= 0) {\n                    ctx.moveTo(points[i].x, points[i].y);\n                    ctx.lineTo(points[i+1].x, points[i+1].y);\n                }\n            }\n            ctx.strokeStyle = color;\n            ctx.lineWidth = isHighlight ? 3 : 1;\n            ctx.setLineDash([]);\n            ctx.stroke();\n        }\n\n        function drawActiveTriangleEdges(tri) {\n            const drawEdge = (vA, vB) => {\n                let dot = Math.max(-1, Math.min(1, dotProduct(vA, vB)));\n                let angle = Math.acos(dot);\n                let sinTheta = Math.sin(angle);\n                if (sinTheta < 0.001) return; \n\n                let segments = 40;\n                ctx.beginPath();\n                let isDrawing = false;\n                \n                for (let i = 0; i <= segments; i++) {\n                    let t = i / segments;\n                    let a = Math.sin((1 - t) * angle) / sinTheta;\n                    let b = Math.sin(t * angle) / sinTheta;\n                    let p = {\n                        x: vA.x * a + vB.x * b,\n                        y: vA.y * a + vB.y * b,\n                        z: vA.z * a + vB.z * b\n                    };\n                    \n                    let pRot = rotate3D(p.x, p.y, p.z, rotX, rotY);\n                    if (pRot.z >= -0.05) { \n                        let screenX = cx + pRot.x * R;\n                        let screenY = cy + pRot.y * R;\n                        if (!isDrawing) {\n                            ctx.moveTo(screenX, screenY);\n                            isDrawing = true;\n                        } else {\n                            ctx.lineTo(screenX, screenY);\n                        }\n                    } else {\n                        isDrawing = false;\n                    }\n                }\n                ctx.shadowBlur = 10;\n                ctx.shadowColor = '#10b981';\n                ctx.strokeStyle = '#34d399'; \n                ctx.lineWidth = 4;\n                ctx.stroke();\n                ctx.shadowBlur = 0;\n            };\n\n            drawEdge(tri.v1, tri.v2);\n            drawEdge(tri.v2, tri.v3);\n            drawEdge(tri.v3, tri.v1);\n        }\n\n        function drawTriangleLabels() {\n            if (!facingTriangle) return;\n\n            const drawText = (v, text) => {\n                let p = rotate3D(v.x, v.y, v.z, rotX, rotY);\n                if (p.z >= -0.1) {\n                    let sx = cx + p.x * R;\n                    let sy = cy + p.y * R;\n                    \n                    ctx.beginPath();\n                    ctx.arc(sx, sy, 6, 0, Math.PI*2);\n                    ctx.fillStyle = '#10b981';\n                    ctx.fill();\n                    ctx.strokeStyle = '#fff';\n                    ctx.lineWidth = 2;\n                    ctx.stroke();\n\n                    ctx.fillStyle = '#fff';\n                    ctx.font = 'bold 22px Times New Roman';\n                    ctx.fillText(text, sx + 12, sy - 12);\n                }\n            };\n\n            drawText(facingTriangle.v1, 'α');\n            drawText(facingTriangle.v2, 'β');\n            drawText(facingTriangle.v3, 'γ');\n        }\n\n        function drawPointPair(p) {\n            let p1 = rotate3D(p.x, p.y, p.z, rotX, rotY);\n            let p2 = rotate3D(-p.x, -p.y, -p.z, rotX, rotY);\n\n            const drawP = (proj, colorFront, colorBack) => {\n                let sx = cx + proj.x * R;\n                let sy = cy + proj.y * R;\n                ctx.beginPath();\n                if (proj.z >= 0) {\n                    ctx.arc(sx, sy, 7, 0, Math.PI*2);\n                    ctx.fillStyle = colorFront;\n                } else {\n                    ctx.arc(sx, sy, 4, 0, Math.PI*2);\n                    ctx.fillStyle = colorBack;\n                }\n                ctx.fill();\n                ctx.strokeStyle = '#fff';\n                ctx.lineWidth = 1;\n                ctx.stroke();\n            };\n\n            drawP(p1, '#ef4444', 'rgba(239, 68, 68, 0.3)');\n            drawP(p2, '#f59e0b', 'rgba(245, 158, 11, 0.3)');\n        }\n\n        function render() {\n            ctx.clearRect(0, 0, width, height);\n            drawSphereBase();\n\n            greatCircles.forEach(circle => {\n                drawCircle(circle.normal, 'rgba(250, 204, 21, 0.9)');\n            });\n\n            pointPairs.forEach(pair => {\n                drawPointPair(pair);\n            });\n\n            updateFacingTriangle(); \n            if (facingTriangle) {\n                drawActiveTriangleEdges(facingTriangle); \n                drawTriangleLabels(); \n            }\n\n            requestAnimationFrame(render);\n        }\n\n        render();\n    <\/script>\n\n<script>\n(function () {\n    function setupMobileSheet(selector) {\n        const panel = document.querySelector(selector);\n        if (!panel || panel.dataset.mobileSheetReady === '1') return;\n        panel.dataset.mobileSheetReady = '1';\n\n        const grip = document.createElement('div');\n        grip.className = 'sheet-grip';\n        grip.setAttribute('aria-hidden', 'true');\n        panel.prepend(grip);\n\n        let startY = 0;\n        let lastY = 0;\n        let dragging = false;\n\n        function isMobile() {\n            return window.matchMedia('(max-width: 820px)').matches;\n        }\n        function setCollapsed(value) {\n            if (!isMobile()) return;\n            document.body.classList.toggle('sheet-collapsed', value);\n        }\n\n        grip.addEventListener('pointerdown', (event) => {\n            if (!isMobile()) return;\n            dragging = true;\n            startY = event.clientY;\n            lastY = event.clientY;\n            grip.setPointerCapture?.(event.pointerId);\n            event.preventDefault();\n        });\n\n        grip.addEventListener('pointermove', (event) => {\n            if (!dragging) return;\n            lastY = event.clientY;\n            event.preventDefault();\n        });\n\n        function finish() {\n            if (!dragging) return;\n            const delta = lastY - startY;\n            if (delta > 24) setCollapsed(true);\n            if (delta < -24) setCollapsed(false);\n            dragging = false;\n        }\n\n        grip.addEventListener('pointerup', finish);\n        grip.addEventListener('pointercancel', finish);\n        grip.addEventListener('click', () => {\n            if (!isMobile()) return;\n            document.body.classList.toggle('sheet-collapsed');\n        });\n    }\n\n    setupMobileSheet('.controls');\n    setupMobileSheet('#ui-container');\n})();\n<\/script>\n\n</body>\n</html>\n", "mandala": "<!DOCTYPE html>\n<html lang=\"fa\" dir=\"rtl\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>هنر هذلولوی: تبدیل موبیوس تعاملی</title>\n    <style>\n        body {\n            font-family: Tahoma, Arial, sans-serif;\n            background-color: #0f0f13;\n            color: #eee;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            margin: 0;\n            padding: 20px;\n        }\n        .container {\n            background: #1a1a24;\n            padding: 20px;\n            border-radius: 15px;\n            box-shadow: 0 10px 30px rgba(0,0,0,0.8);\n            text-align: center;\n            max-width: 900px;\n            width: 100%;\n        }\n        canvas {\n            background-color: #050508;\n            border: 2px solid #333;\n            border-radius: 50%;\n            margin-top: 15px;\n            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);\n            cursor: crosshair;\n        }\n        .instructions {\n            font-size: 1em;\n            color: #aaa;\n            line-height: 1.8;\n            margin-bottom: 10px;\n        }\n        .highlight {\n            color: #00ffff;\n            font-weight: bold;\n        }\n        \n        /* استایل‌های مربوط به فرمول ریاضی آفلاین */\n        .math-formula {\n            display: inline-flex;\n            align-items: center;\n            font-family: \"Times New Roman\", Times, serif;\n            font-size: 1.2em;\n            color: #fff;\n            direction: ltr; /* فرمول‌ها باید چپ‌به‌راست باشند */\n            margin: 0 5px;\n            vertical-align: middle;\n        }\n        .math-fraction {\n            display: inline-flex;\n            flex-direction: column;\n            align-items: center;\n            margin: 0 5px;\n        }\n        .math-num {\n            padding: 0 5px;\n            border-bottom: 1px solid #fff; /* خط کسر */\n            line-height: 1.2;\n        }\n        .math-den {\n            padding: 0 5px;\n            line-height: 1.2;\n        }\n        .math-italic {\n            font-style: italic;\n        }\n    \n        /* mobile-layout-fix-v2-mandala */\n        @media (max-width: 820px) {\n            html, body {\n                width: 100%;\n                min-height: 100%;\n                overflow: auto !important;\n            }\n            body {\n                display: block !important;\n                padding: 8px !important;\n            }\n            .container {\n                width: 100% !important;\n                max-width: 100% !important;\n                padding: 12px !important;\n                border-radius: 10px !important;\n            }\n            h2 {\n                font-size: 1rem !important;\n                line-height: 1.35;\n                margin: 0 0 8px !important;\n            }\n            .instructions {\n                font-size: 0.84rem !important;\n                line-height: 1.55 !important;\n            }\n            .math-formula { font-size: 1em !important; }\n            canvas {\n                width: min(100%, calc(100vw - 32px)) !important;\n                height: auto !important;\n                max-width: none !important;\n                touch-action: none;\n            }\n        }\n        @media (max-width: 430px) {\n            body { padding: 6px !important; }\n            .container { padding: 10px !important; }\n            .instructions { font-size: 0.78rem !important; }\n        }\n\n        /* mobile-native-v3-mandala */\n        @media (max-width: 820px) {\n            html, body {\n                width: 100%;\n                min-height: 100dvh;\n                overflow: auto !important;\n                background: #0f0f13 !important;\n            }\n            body {\n                display: block !important;\n                padding: 0 !important;\n            }\n            .container {\n                width: 100% !important;\n                max-width: 100% !important;\n                min-height: 100dvh;\n                padding: 10px !important;\n                border-radius: 0 !important;\n                box-shadow: none !important;\n                display: flex;\n                flex-direction: column;\n                justify-content: flex-start;\n                gap: 8px;\n                background: #0f0f13 !important;\n            }\n            h2 {\n                font-size: 1rem !important;\n                line-height: 1.35;\n                margin: 0 !important;\n            }\n            .instructions {\n                font-size: 0.82rem !important;\n                line-height: 1.5 !important;\n                max-height: 24dvh;\n                overflow-y: auto;\n                margin-bottom: 0 !important;\n                -webkit-overflow-scrolling: touch;\n            }\n            .math-formula {\n                font-size: 1em !important;\n            }\n            canvas {\n                width: min(calc(100vw - 20px), calc(100dvh - 160px)) !important;\n                height: auto !important;\n                max-width: 100% !important;\n                align-self: center;\n                margin-top: 4px !important;\n                touch-action: none;\n            }\n        }\n        @media (max-width: 430px) {\n            .container {\n                padding: 8px !important;\n            }\n            .instructions {\n                font-size: 0.76rem !important;\n                max-height: 27dvh;\n            }\n            canvas {\n                width: min(calc(100vw - 16px), calc(100dvh - 150px)) !important;\n            }\n        }\n\n\n        /* mobile-doc-edge-safe-v13 */\n        @media (max-width: 820px) {\n            html,\n            body {\n                width: 100%;\n                max-width: 100%;\n                overflow-x: hidden !important;\n            }\n            *,\n            *::before,\n            *::after {\n                box-sizing: border-box;\n            }\n        }\n\n</style>\n</head>\n<body>\n\n<div class=\"container\">\n    <h2>ماندالای هذلولوی سیال</h2>\n    <div class=\"instructions\">\n        موس خود را <span class=\"highlight\">داخل دایره سیاه</span> حرکت دهید.<br>\n        شما در حال تغییر پارامتر <span class=\"math-formula\"><span class=\"math-italic\">b</span></span> در فرمول \n        \n        <!-- ساختار HTML فرمول بدون نیاز به اینترنت -->\n        <span class=\"math-formula\">\n            <span class=\"math-italic\">f(z)</span> = \n            <span class=\"math-fraction\">\n                <span class=\"math-num\"><span class=\"math-italic\">z + b</span></span>\n                <!-- اول z دار، سپس عدد ثابت -->\n                <span class=\"math-den\"><span class=\"math-italic\">b&#772;z</span> + 1</span>\n            </span>\n        </span>\n        \n        هستید. <br>\n        دقت کنید که چگونه خطوط راست خمیده می‌شوند، اما زاویه تقاطع آن‌ها همیشه ثابت می‌ماند!\n    </div>\n\n    <canvas id=\"artCanvas\" width=\"700\" height=\"700\"></canvas>\n</div>\n\n<script>\n    const canvas = document.getElementById('artCanvas');\n    const ctx = canvas.getContext('2d');\n    \n    const width = canvas.width;\n    const height = canvas.height;\n    const centerX = width / 2;\n    const centerY = height / 2;\n    const R = 340;\n\n    let basePaths = [];\n\n    // شبکه‌های شعاعی\n    for (let theta = 0; theta < Math.PI * 2; theta += Math.PI / 12) {\n        let path = [];\n        for (let r = 0; r <= 0.99; r += 0.02) {\n            path.push({x: r * Math.cos(theta), y: r * Math.sin(theta)});\n        }\n        basePaths.push({points: path, color: 'rgba(0, 255, 255, 0.5)', width: 1});\n    }\n\n    // دایره‌های متحدالمرکز\n    for (let r = 0.15; r < 1; r += 0.15) {\n        let path = [];\n        for (let theta = 0; theta <= Math.PI * 2.05; theta += 0.05) {\n            path.push({x: r * Math.cos(theta), y: r * Math.sin(theta)});\n        }\n        let hue = Math.floor((r * 360));\n        basePaths.push({points: path, color: `hsla(${hue}, 100%, 60%, 0.7)`, width: 2});\n    }\n\n    // گل هندسی در مرکز\n    let rosePath = [];\n    for (let theta = 0; theta <= Math.PI * 2.01; theta += 0.01) {\n        let r = 0.75 * Math.abs(Math.sin(3 * theta)); \n        rosePath.push({x: r * Math.cos(theta), y: r * Math.sin(theta)});\n    }\n    basePaths.push({points: rosePath, color: '#ff00ff', width: 3});\n\n    // تابع تبدیل موبیوس\n    function mobiusTransform(x, y, bx, by) {\n        let Nx = x + bx;\n        let Ny = y + by;\n\n        let Dx = 1 + (bx * x + by * y);\n        let Dy = (bx * y - by * x);\n\n        let D_sq = Dx * Dx + Dy * Dy;\n        \n        let wx = (Nx * Dx + Ny * Dy) / D_sq;\n        let wy = (Ny * Dx - Nx * Dy) / D_sq;\n\n        return {x: wx, y: wy};\n    }\n\n    // تابع رسم کل صفحه\n    function draw(bx, by) {\n        ctx.clearRect(0, 0, width, height);\n\n        ctx.shadowBlur = 10;\n        ctx.lineJoin = 'round';\n\n        for (let shape of basePaths) {\n            ctx.beginPath();\n            ctx.strokeStyle = shape.color;\n            ctx.lineWidth = shape.width;\n            ctx.shadowColor = shape.color;\n\n            let firstPoint = true;\n\n            for (let pt of shape.points) {\n                let transformed = mobiusTransform(pt.x, pt.y, bx, by);\n                \n                let canvasX = centerX + transformed.x * R;\n                let canvasY = centerY - transformed.y * R; \n\n                if (firstPoint) {\n                    ctx.moveTo(canvasX, canvasY);\n                    firstPoint = false;\n                } else {\n                    ctx.lineTo(canvasX, canvasY);\n                }\n            }\n            ctx.stroke();\n        }\n\n        let canvasBx = centerX + bx * R;\n        let canvasBy = centerY - by * R;\n        \n        ctx.beginPath();\n        ctx.arc(canvasBx, canvasBy, 6, 0, Math.PI * 2);\n        ctx.fillStyle = '#ffffff';\n        ctx.shadowColor = '#ffffff';\n        ctx.shadowBlur = 15;\n        ctx.fill();\n    }\n\n    // مدیریت رویداد موس\n    canvas.addEventListener('mousemove', (event) => {\n        let rect = canvas.getBoundingClientRect();\n        let mouseX = event.clientX - rect.left;\n        let mouseY = event.clientY - rect.top;\n\n        let bx = (mouseX - centerX) / R;\n        let by = (centerY - mouseY) / R; \n\n        let r2 = bx * bx + by * by;\n        if (r2 > 0.9) {\n            let scale = Math.sqrt(0.9 / r2);\n            bx *= scale;\n            by *= scale;\n        }\n\n        requestAnimationFrame(() => draw(bx, by));\n    });\n\n\n    draw(0, 0);\n\n<\/script>\n\n\n\n\n<script>\n(function () {\n    if (!window.matchMedia('(max-width: 820px)').matches) return;\n    const canvas = document.getElementById('artCanvas');\n    if (!canvas || canvas.dataset.smoothTouchReady === '1') return;\n    canvas.dataset.smoothTouchReady = '1';\n\n    let nextPoint = null;\n    let raf = 0;\n\n    function drawSmoothPoint(clientX, clientY) {\n        nextPoint = { clientX, clientY };\n        if (raf) return;\n        raf = requestAnimationFrame(() => {\n            raf = 0;\n            if (!nextPoint) return;\n            const rect = canvas.getBoundingClientRect();\n            const scaleX = canvas.width / rect.width;\n            const scaleY = canvas.height / rect.height;\n            const mouseX = (nextPoint.clientX - rect.left) * scaleX;\n            const mouseY = (nextPoint.clientY - rect.top) * scaleY;\n            let bx = (mouseX - centerX) / R;\n            let by = (centerY - mouseY) / R;\n            const r2 = bx * bx + by * by;\n            if (r2 > 0.9) {\n                const scale = Math.sqrt(0.9 / r2);\n                bx *= scale;\n                by *= scale;\n            }\n            draw(bx, by);\n        });\n    }\n\n    canvas.addEventListener('pointerdown', (event) => {\n        canvas.setPointerCapture?.(event.pointerId);\n        event.preventDefault();\n        drawSmoothPoint(event.clientX, event.clientY);\n    }, { passive: false });\n\n    canvas.addEventListener('pointermove', (event) => {\n        if (event.pointerType === 'mouse' && !event.buttons) return;\n        event.preventDefault();\n        drawSmoothPoint(event.clientX, event.clientY);\n    }, { passive: false });\n})();\n<\/script>\n\n</body>\n</html>\n"}}}, "labels": {"en": {"langButton": "فارسی", "sections": {"articles": "Articles", "tools": "Non-Euclidean Drawing Tools"}, "tabs": {"escape": "Escape from the Euclidean Prison of the Mind", "popper": "Popper, Meaning, and Demarcation", "pdisk": "Poincare Disk", "sphere": "Spherical Geometry", "mandala": "Mandala Shape"}}, "fa": {"langButton": "English", "sections": {"articles": "مقالات", "tools": "ابزارهای ترسیم نااقلیدسی"}, "tabs": {"escape": "رهایی از زندان اقلیدسی ذهن", "popper": "پوپر، معنا و ملاک تحدید", "pdisk": "دیسک پوانکاره", "sphere": "هندسه کروی", "mandala": "شکل ماندالا"}}}}</script>
    <script>
        const portalData = JSON.parse(document.getElementById('portal-data').textContent);
        const state = { lang: 'en', section: 'articles', item: 'escape' };
        const sectionItems = {
            articles: ['escape', 'popper'],
            tools: ['pdisk', 'sphere', 'mandala']
        };

        const tabs = document.getElementById('tabs');
        const viewer = document.getElementById('viewer');
        const langToggle = document.getElementById('langToggle');
        const sectionButtons = Array.from(document.querySelectorAll('[data-section]'));
        const mobileMenuButton = document.getElementById('mobileMenuButton');
        const mobileMenu = document.getElementById('mobileMenu');
        const mobileScrim = document.getElementById('mobileScrim');
        const mobileClose = document.getElementById('mobileClose');
        const mobileMenuList = document.getElementById('mobileMenuList');
        const mobileMenuTitle = document.getElementById('mobileMenuTitle');

        function closeMobileMenu() {
            document.body.classList.remove('mobile-menu-open');
            mobileMenuButton.setAttribute('aria-expanded', 'false');
            mobileMenu.setAttribute('aria-hidden', 'true');
        }

        function openMobileMenu() {
            document.body.classList.add('mobile-menu-open');
            mobileMenuButton.setAttribute('aria-expanded', 'true');
            mobileMenu.setAttribute('aria-hidden', 'false');
        }

        function renderMobileMenu(labels) {
            mobileMenuTitle.textContent = state.lang === 'fa' ? 'فهرست' : 'Menu';
            mobileMenuList.innerHTML = '';

            ['articles', 'tools'].forEach((section) => {
                const heading = document.createElement('div');
                heading.className = 'mobile-nav-heading';
                heading.textContent = labels.sections[section];
                mobileMenuList.appendChild(heading);

                sectionItems[section].forEach((item) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'mobile-nav-item';
                    if (state.section === section && state.item === item) {
                        button.classList.add('is-active');
                    }
                    button.textContent = labels.tabs[item];
                    button.addEventListener('click', () => {
                        state.section = section;
                        state.item = item;
                        closeMobileMenu();
                        render();
                    });
                    mobileMenuList.appendChild(button);
                });
            });
        }

        function render() {
            const labels = portalData.labels[state.lang];
            document.documentElement.lang = state.lang;
            document.documentElement.dir = state.lang === 'fa' ? 'rtl' : 'ltr';
            mobileMenu.dir = state.lang === 'fa' ? 'rtl' : 'ltr';
            langToggle.textContent = labels.langButton;

            sectionButtons.forEach((button) => {
                const section = button.dataset.section;
                button.textContent = labels.sections[section];
                button.setAttribute('aria-pressed', String(section === state.section));
            });

            tabs.innerHTML = '';
            sectionItems[state.section].forEach((item) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'tab-button';
                button.textContent = labels.tabs[item];
                button.setAttribute('role', 'tab');
                button.setAttribute('aria-selected', String(item === state.item));
                button.addEventListener('click', () => {
                    state.item = item;
                    render();
                });
                tabs.appendChild(button);
            });

            renderMobileMenu(labels);
            viewer.srcdoc = portalData.docs[state.lang][state.section][state.item];
        }

        langToggle.addEventListener('click', () => {
            state.lang = state.lang === 'en' ? 'fa' : 'en';
            render();
        });

        sectionButtons.forEach((button) => {
            button.addEventListener('click', () => {
                state.section = button.dataset.section;
                state.item = sectionItems[state.section][0];
                render();
            });
        });

        mobileMenuButton.addEventListener('click', openMobileMenu);
        mobileScrim.addEventListener('click', closeMobileMenu);
        mobileClose.addEventListener('click', closeMobileMenu);
        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeMobileMenu();
        });

        render();
    </script>
